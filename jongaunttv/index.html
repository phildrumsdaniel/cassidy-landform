<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Jon Gaunt TV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0D1B2A;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#fff;overscroll-behavior:none;height:100vh;overflow:hidden;}
::-webkit-scrollbar{display:none;}
a{color:inherit;text-decoration:none;}
button,input,textarea{font-family:inherit;outline:none;}
@keyframes pulse{0%{transform:scale(1);opacity:0.6}100%{transform:scale(2.5);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.screen{animation:fadeIn 0.2s ease;}
.pulse-ring{position:relative;display:inline-block;width:10px;height:10px;}
.pulse-ring::before{content:"";position:absolute;inset:0;border-radius:50%;background:var(--pc,#C0392B);opacity:0.4;animation:pulse 1.5s ease-out infinite;}
.pulse-ring::after{content:"";position:absolute;inset:2px;border-radius:50%;background:var(--pc,#C0392B);}
.tab-content{overflow-y:auto;height:calc(100vh - 108px);-webkit-overflow-scrolling:touch;}
.nav-btn{flex:1;background:transparent;border:none;padding:10px 4px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-icon{font-size:18px;}
.nav-label{font-size:10px;}
.nav-bar{display:none;}
.video-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#243B55;}
.pill{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;-webkit-overflow-scrolling:touch;}
.pill::-webkit-scrollbar{display:none;}
.filter-btn{background:#1E2F44;color:#8B9AB0;border:1px solid #2E3F55;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.filter-btn.active{background:#C0392B;color:#fff;border-color:#C0392B;}
.check-box{width:22px;height:22px;border-radius:5px;border:2px solid #2E3F55;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:700;color:#fff;transition:all 0.2s;}
.check-box.checked{background:#27AE60;border-color:#27AE60;}
input[type=file]{display:none;}
</style>
</head>
<body>

<div id="root" style="max-width:390px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:#0D1B2A;">

  <!-- TOP BAR -->
  <div style="background:#1A2D42;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2E3F55;flex-shrink:0;z-index:100;">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBAUEBAYFBQUGBgYHCQ4JCQgICRINDQoOFRIWFhUSFBQXGiEcFxgfGRQUHScdHyIjJSUlFhwpLCgkKyEkJST/2wBDAQYGBgkICREJCREkGBQYJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQk..." id="jonThumb" style="width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:center 15%;border:2px solid #C0392B;flex-shrink:0;" onerror="this.style.display='none'"/>
      <div>
        <div style="color:#fff;font-weight:900;font-size:14px;line-height:1;">Jon Gaunt TV</div>
        <div style="color:#8B9AB0;font-size:10px;">Free Speech · No Filter</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="pulse-ring"></span>
      <span style="color:#C0392B;font-size:11px;font-weight:700;">LIVE</span>
      <button onclick="joinFree(this)" style="background:#C0392B;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;">Join Free</button>
    </div>
  </div>

  <!-- TAB CONTENT -->
  <div class="tab-content" id="tabContent"></div>

  <!-- BOTTOM NAV -->
  <div style="background:#1A2D42;border-top:1px solid #2E3F55;display:flex;flex-shrink:0;z-index:100;">
    <button class="nav-btn" onclick="showTab('home')" id="nav-home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label" style="color:#C0392B;font-weight:700;">Home</span>
      <div style="width:16px;height:2px;background:#C0392B;border-radius:2px;"></div>
    </button>
    <button class="nav-btn" onclick="showTab('episodes')" id="nav-episodes">
      <span class="nav-icon">▶</span>
      <span class="nav-label" style="color:#8B9AB0;">Episodes</span>
    </button>
    <button class="nav-btn" onclick="showTab('books')" id="nav-books">
      <span class="nav-icon">📚</span>
      <span class="nav-label" style="color:#8B9AB0;">Books</span>
    </button>
    <button class="nav-btn" onclick="showTab('shop')" id="nav-shop">
      <span class="nav-icon">🛍️</span>
      <span class="nav-label" style="color:#8B9AB0;">Shop</span>
    </button>
    <button class="nav-btn" onclick="showTab('sendview')" id="nav-sendview">
      <span class="nav-icon">🎬</span>
      <span class="nav-label" style="color:#8B9AB0;">Send View</span>
    </button>
  </div>

</div>

function setRegion(key, region, uk, us, price) {
  const box = document.getElementById("reg_"+key);
  const link = document.getElementById("buylink_"+key);
  if (!box||!link) return;
  const btns = box.querySelectorAll("button");
  const url = region==="uk" ? uk : us;
  const label = region==="uk" ? "UK" : "US";
  btns[0].style.background = region==="uk" ? "#C0392B" : "transparent";
  btns[0].style.color = region==="uk" ? "#fff" : "#8B9AB0";
  btns[1].style.background = region==="us" ? "#C0392B" : "transparent";
  btns[1].style.color = region==="us" ? "#fff" : "#8B9AB0";
  link.href = url;
  link.textContent = `Buy on Amazon ${label} — ${price}`;
}

        style="border:2px dashed #2E3F55;border-radius:12px;background:#1E2F44;padding:28px 20px;text-align:center;cursor:pointer;">
        <div style="font-size:36px;margin-bottom:10px;">🎬</div>
        <div id="fileLabel" style="color:#fff;font-weight:700;font-size:14px;margin-bottom:4px;">${submitFile?submitFile.name:"Tap to choose your video"}</div>
        <div style="color:#8B9AB0;font-size:12px;">${submitFile?((submitFile.size/1024/1024).toFixed(1)+"MB"):"MP4, MOV, AVI — max 200MB"}</div>
        <input id="sv_file" type="file" accept="video/*" onchange="handleFileChange(this)"/>
      </div>
    </div>
    <div style="background:#1A2D42;border-radius:10px;padding:12px;margin-bottom:14px;border:1px solid #2E3F55;">
      <div style="color:#F0A500;font-weight:700;font-size:12px;margin-bottom:8px;">💡 Tips for a great submission</div>
      ${["Keep it under 3 minutes — punchy gets picked","Film landscape, good lighting, speak clearly","Say your name and where you are from","Be direct — Jon loves a strong opinion"].map(t=>`<div style="color:#8B9AB0;font-size:12px;margin-bottom:5px;padding-left:10px;border-left:2px solid #C0392B;">${t}</div>`).join("")}
    </div>
    <div onclick="toggleAgree()" id="agreeBox"
      style="display:flex;gap:10px;align-items:flex-start;background:#1E2F44;border-radius:10px;padding:12px;margin-bottom:16px;border:1px solid ${submitAgree?"#27AE60":"#2E3F55"};cursor:pointer;">
      <div class="check-box ${submitAgree?"checked":""}" id="checkIcon">${submitAgree?"✓":""}</div>
      <div style="color:#8B9AB0;font-size:12px;line-height:1.5;">I confirm this is my original video and I give Jon Gaunt TV permission to broadcast it on the show, YouTube, TikTok and all platforms. I am over 18.</div>
    </div>
    <button onclick="doSubmit()" style="width:100%;background:linear-gradient(90deg,#C0392B,#E74C3C);color:#fff;border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;">
      Submit to Jon Gaunt TV
    </button>
  </div>`;

  // landing
  return `<div class="screen" style="padding-bottom:20px;">
    <div style="background:linear-gradient(180deg,#1A2D42,#0D1B2A);padding:24px 16px;border-bottom:1px solid #2E3F55;text-align:center;">
      ${jonAvatar(80,"margin:0 auto 14px;display:block;border:3px solid #C0392B;")}
      <div style="color:#fff;font-weight:900;font-size:22px;line-height:1.2;margin-bottom:8px;">Send Your View to Jon</div>
      <div style="color:#8B9AB0;font-size:13px;line-height:1.7;margin-bottom:16px;max-width:300px;margin-left:auto;margin-right:auto;">Record a short video with your opinion — Jon personally reviews every submission and responds to the best on his live show.</div>
      <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(192,57,43,0.15);border:1px solid #C0392B;border-radius:20px;padding:7px 14px;">
        <span class="pulse-ring" style="--pc:#C0392B;"></span>
        <span style="color:#C0392B;font-size:12px;font-weight:700;">Jon watches every video personally</span>
      </div>
    </div>
    <div style="padding:20px 16px 0;">
      <div style="color:#8B9AB0;font-size:11px;font-weight:700;letter-spacing:0.1em;margin-bottom:14px;">HOW IT WORKS</div>
      ${[
        {icon:"🎬",step:"Record your view",desc:"Film yourself giving your opinion — under 3 minutes, any topic Jon covers"},
        {icon:"📤",step:"Submit to Jon",desc:"Upload here — Jon personally vets every submission before anything airs"},
        {icon:"⭐",step:"Get selected",desc:"If Jon picks your video it plays on the live show in front of thousands"},
        {icon:"🎙️",step:"Jon responds",desc:"Jon plays your clip and gives his full unfiltered response on air"},
      ].map((item,i)=>`<div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:16px;">
        <div style="width:46px;height:46px;border-radius:12px;background:#1E2F44;border:1px solid #2E3F55;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${item.icon}</div>
        <div style="flex:1;padding-top:2px;">
          <div style="color:#fff;font-weight:700;font-size:14px;margin-bottom:3px;">${item.step}</div>
          <div style="color:#8B9AB0;font-size:12px;line-height:1.5;">${item.desc}</div>
        </div>
        <div style="color:#C0392B;font-weight:900;font-size:20px;padding-top:6px;">${i+1}</div>
      </div>`).join("")}
      ${adBanner()}
      <div style="color:#8B9AB0;font-size:11px;font-weight:700;letter-spacing:0.1em;margin-bottom:12px;">FEATURED ON THE SHOW</div>
      ${SUBS.map(s=>`<div style="background:#1E2F44;border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid #2E3F55;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="color:#fff;font-weight:700;font-size:13px;">${s.flag} ${s.name}</span>
          ${s.aired?`<span style="background:#27AE60;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;">AIRED</span>`:`<span style="background:#F0A500;color:#1a0e00;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;">PENDING</span>`}
        </div>
        <div style="background:#1A2D42;border-radius:5px;padding:3px 8px;margin-bottom:6px;display:inline-block;"><span style="color:#C0392B;font-size:11px;font-weight:600;">${s.topic}</span></div>
        <div style="color:rgba(255,255,255,0.7);font-size:12px;line-height:1.5;font-style:italic;">${s.preview}</div>
      </div>`).join("")}
      <button onclick="showSendView('form')"
        style="width:100%;background:linear-gradient(90deg,#C0392B,#E74C3C);color:#fff;border:none;border-radius:12px;padding:18px;font-size:16px;font-weight:900;cursor:pointer;margin-top:8px;margin-bottom:8px;">
        🎬 Send Your View to Jon
      </button>
      <div style="text-align:center;color:#8B9AB0;font-size:11px;margin-bottom:16px;">Free to submit · Vetted by Jon personally · Over 18s only</div>
    </div>
  </div>`;
}

// ── NAV & ROUTING ──────────────────────────────────────────────
let currentTab = "home";
let currentFilter = "All";

function showTab(tab) {
  currentTab = tab;
  const nav = ["home","episodes","books","shop","sendview"];
  nav.forEach(t => {
    const btn = document.getElementById("nav-"+t);
    if(!btn) return;
    const label = btn.querySelector(".nav-label");
    const dot = btn.querySelector(".nav-dot");
    if(dot) dot.remove();
    if(label) label.style.color = t===tab ? "#C0392B" : "#8B9AB0";
    label.style.fontWeight = t===tab ? "700" : "400";
    if(t===tab) {
      if(!btn.querySelector(".nav-dot")) {
        const d = document.createElement("div");
        d.className = "nav-dot";
        d.style.cssText = "width:16px;height:2px;background:#C0392B;border-radius:2px;";
        btn.appendChild(d);
      }
    }
  });
  const content = document.getElementById("tabContent");
  content.scrollTop = 0;
  adIdx = 0;
  if(tab==="home") content.innerHTML = renderHome();
  else if(tab==="episodes") content.innerHTML = renderEpisodes(currentFilter);
  else if(tab==="books") content.innerHTML = renderBooks();
  else if(tab==="shop") content.innerHTML = renderShop();
  else if(tab==="sendview") content.innerHTML = renderSendView("landing");

  // Fix the top bar thumbnail with full image
  const t = document.getElementById("jonThumb");
  if(t) t.src = JON;
}

function showEpisodes(filter) {
  currentFilter = filter;
  adIdx = 0;
  document.getElementById("tabContent").innerHTML = renderEpisodes(filter);
}

function showSendView(stage) {
  adIdx = 0;
  document.getElementById("tabContent").innerHTML = renderSendView(stage);
}

function selectTopic(t) {
  submitTopic = t;
  document.querySelectorAll("#topicBtns .filter-btn").forEach(b=>{ b.classList.remove("active"); });
  const id = "tp_"+t.replace(/[^a-z]/gi,"");
  const el = document.getElementById(id);
  if(el) el.classList.add("active");
}

function toggleAgree() {
  submitAgree = !submitAgree;
  const box = document.getElementById("agreeBox");
  const icon = document.getElementById("checkIcon");
  if(box) box.style.borderColor = submitAgree ? "#27AE60" : "#2E3F55";
  if(icon) { icon.classList.toggle("checked", submitAgree); icon.textContent = submitAgree?"✓":""; }
}

function handleFileChange(input) {
  const f = input.files[0];
  if(!f) return;
  if(f.size > 200*1024*1024) { alert("File too large — max 200MB"); return; }
  submitFile = f;
  const lbl = document.getElementById("fileLabel");
  if(lbl) lbl.textContent = f.name;
}

function doSubmit() {
  const nameEl = document.getElementById("sv_name");
  if(nameEl) submitName = nameEl.value.trim();
  if(!submitName) { alert("Please add your name"); return; }
  if(!submitTopic) { alert("Please select a topic"); return; }
  if(!submitFile) { alert("Please add your video"); return; }
  if(!submitAgree) { alert("Please tick the permission box"); return; }
  showSendView("success");
}

function playVideo(ytId, title) {
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.98);z-index:300;display:flex;flex-direction:column;align-items:center;";
  const panel = document.createElement("div");
  panel.style.cssText = "width:100%;max-width:390px;height:100%;display:flex;flex-direction:column;";
  panel.innerHTML = `
    <div style="background:#1A2D42;padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #2E3F55;flex-shrink:0;">
      <img src="${JON}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;object-position:center 15%;border:2px solid #C0392B;flex-shrink:0;"/>
      <div style="flex:1;min-width:0;color:#fff;font-weight:700;font-size:12px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${title}</div>
      <button onclick="this.closest('div[style*=z-index]').remove()" style="background:#1E2F44;color:#fff;border:1px solid #2E3F55;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;flex-shrink:0;">✕ Close</button>
    </div>
    <div style="flex:1;position:relative;background:#000;">
      <iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&rel=0&modestbranding=1"
        style="position:absolute;inset:0;width:100%;height:100%;border:none;"
        allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>
    </div>
    <div style="padding:12px 16px;background:#1A2D42;border-top:1px solid #2E3F55;flex-shrink:0;">
      <div style="margin-bottom:10px;">
        <a href="https://www.buymeacoffee.com/Jongaunt" target="_blank" style="display:block;background:linear-gradient(135deg,#1a0a00,#3d1f00);border:1px solid #2E3F55;border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;">
          <div><div style="font-size:9px;color:#8B9AB0;letter-spacing:0.1em;margin-bottom:2px;">SPONSORED</div><div style="font-size:12px;color:#fff;font-weight:600;">☕ Help fund the app — Buy Jon a Coffee</div></div>
          <div style="background:#F0A500;color:#1a0e00;font-size:11px;font-weight:700;padding:6px 10px;border-radius:6px;white-space:nowrap;margin-left:10px;">Support →</div>
        </a>
      </div>
      <div style="display:flex;gap:10px;">
        <a href="https://www.youtube.com/@JonGauntTV?sub_confirmation=1" target="_blank"
          style="flex:1;background:#FF0000;color:#fff;border-radius:8px;padding:12px;font-size:13px;font-weight:700;text-align:center;display:block;">▶ Subscribe on YouTube</a>
        <button onclick="this.closest('div[style*=z-index]').remove()" style="background:#1E2F44;color:#8B9AB0;border:1px solid #2E3F55;border-radius:8px;padding:12px 16px;font-size:12px;cursor:pointer;">Back</button>
      </div>
    </div>`;
  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

// Init
showTab("home");
</script>
</body>
</html>
