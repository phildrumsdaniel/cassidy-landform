<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landform Process Chart · Cassidy Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1E1F5C;
  --navy-deep:#13144A;
  --navy-soft:#3A3D6A;
  --gold:#EDE84A;
  --gold-deep:#9A7B3E;
  --green:#2D7A65;
  --bronze:#B05A35;
  --paper:#F8F6F0;
  --paper-deep:#EFEBE0;
  --rule:#D6D2C4;
  --ink:#1A1A2E;
  --mute:#7278A0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"DM Sans",sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:14px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

/* ─── PAGE HEADER ──────────────────────────────────────────────────── */
.lf-header{
  background:var(--navy);
  color:white;
  padding:24px 40px 22px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  border-bottom:5px solid var(--gold);
}
.lf-brand{display:flex;align-items:baseline;gap:14px}
.lf-brand-mark{
  font-family:"Fraunces",serif;
  font-size:32px;
  font-weight:800;
  color:var(--gold);
  letter-spacing:-0.02em;
  line-height:1;
}
.lf-brand-name{
  font-family:"Fraunces",serif;
  font-size:24px;
  font-weight:600;
  color:white;
  letter-spacing:-0.01em;
}
.lf-brand-sub{
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.6);
  margin-top:4px;
}
.lf-version{
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--gold);
  background:rgba(237,232,74,0.12);
  padding:6px 12px;
  border-radius:3px;
  font-weight:700;
}

/* ─── ROUTE SELECTOR ───────────────────────────────────────────────── */
.lf-routebar{
  background:var(--navy-deep);
  padding:18px 40px;
  display:flex;
  align-items:center;
  gap:24px;
  flex-wrap:wrap;
}
.lf-routebar-label{
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--gold);
  font-weight:700;
}
.lf-routes{display:flex;gap:10px;flex-wrap:wrap}
.lf-route{
  background:transparent;
  border:1px solid rgba(255,255,255,0.25);
  color:rgba(255,255,255,0.85);
  padding:7px 16px;
  font-size:12px;
  font-family:"DM Sans",sans-serif;
  font-weight:500;
  letter-spacing:0.03em;
  border-radius:3px;
  cursor:pointer;
  transition:all 0.18s;
}
.lf-route:hover{border-color:var(--gold);color:white}
.lf-route.active{
  background:var(--gold);
  color:var(--navy-deep);
  border-color:var(--gold);
  font-weight:700;
}
.lf-print-btn{
  margin-left:auto;
  background:var(--gold);
  color:var(--navy-deep);
  border:none;
  padding:9px 18px;
  font-size:11px;
  font-family:"DM Sans",sans-serif;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  transition:all 0.18s;
}
.lf-print-btn:hover{background:white}

/* ─── CHART CANVAS ─────────────────────────────────────────────────── */
.lf-chart-wrap{
  position:relative;
  overflow:auto;
  background:
    radial-gradient(circle at 30% 20%, rgba(30,31,92,0.04), transparent 40%),
    radial-gradient(circle at 70% 80%, rgba(176,90,53,0.04), transparent 40%),
    var(--paper);
  min-height:calc(100vh - 156px);
}
.lf-chart{
  position:relative;
  padding:50px 40px 80px;
  min-width:1500px;
}
.lf-group{
  margin-bottom:42px;
}
.lf-group-label{
  font-family:"Fraunces",serif;
  font-size:13px;
  font-weight:600;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--navy);
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:18px;
}
.lf-group-label::before{
  content:"";
  display:inline-block;
  width:28px;
  height:2px;
  background:var(--gold-deep);
}
.lf-group-label::after{
  content:"";
  flex:1;
  height:1px;
  background:linear-gradient(to right, var(--rule), transparent);
}
.lf-group-num{
  font-family:"Fraunces",serif;
  font-style:italic;
  font-weight:400;
  color:var(--gold-deep);
  margin-right:6px;
}

.lf-row{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  align-items:stretch;
}

/* ─── STAGE NODES ──────────────────────────────────────────────────── */
.lf-node{
  background:white;
  border:1.5px solid var(--rule);
  border-left:4px solid var(--navy);
  border-radius:3px;
  padding:14px 16px;
  width:215px;
  cursor:pointer;
  position:relative;
  transition:all 0.2s;
  display:flex;
  flex-direction:column;
  font-family:"DM Sans",sans-serif;
}
.lf-node:hover{
  transform:translateY(-2px);
  border-color:var(--gold-deep);
  box-shadow:0 8px 24px -8px rgba(30,31,92,0.18);
}
.lf-node.faded{opacity:0.22;pointer-events:none}
.lf-node-num{
  font-family:"Fraunces",serif;
  font-style:italic;
  font-size:10px;
  color:var(--gold-deep);
  letter-spacing:0.05em;
  margin-bottom:3px;
}
.lf-node-icon{
  font-size:18px;
  position:absolute;
  top:12px;
  right:14px;
  opacity:0.8;
}
.lf-node-title{
  font-family:"Fraunces",serif;
  font-size:15px;
  font-weight:600;
  color:var(--navy);
  letter-spacing:-0.005em;
  line-height:1.2;
  margin-bottom:5px;
  padding-right:28px;
}
.lf-node-sub{
  font-size:11px;
  color:var(--mute);
  line-height:1.4;
}
.lf-node-route-tags{
  display:flex;
  gap:4px;
  margin-top:8px;
  flex-wrap:wrap;
}
.lf-tag{
  font-size:8.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-weight:700;
  padding:2px 7px;
  border-radius:2px;
  background:var(--paper-deep);
  color:var(--navy-soft);
}
.lf-tag.sfh{background:rgba(45,122,101,0.12);color:var(--green)}
.lf-tag.btr{background:rgba(30,31,92,0.10);color:var(--navy)}
.lf-tag.pbsa{background:rgba(176,90,53,0.12);color:var(--bronze)}
.lf-tag.asset{background:rgba(154,123,62,0.15);color:var(--gold-deep)}
.lf-tag.mix{background:rgba(115,103,160,0.15);color:#6a5ba0}

/* Decision / gate nodes have a different shape */
.lf-node.decision{
  border-left-color:var(--bronze);
  background:#FDF8F3;
}
.lf-node.gate{
  border-left-color:var(--green);
  background:#F4FAF7;
}
.lf-node.fast{
  border-left-color:var(--gold-deep);
  background:#FCF8EC;
}

/* Connector arrows ↓ between groups */
.lf-arrow{
  text-align:center;
  font-size:22px;
  color:var(--rule);
  margin:6px 0 -12px;
  line-height:1;
}

/* ─── DETAIL OVERLAY ───────────────────────────────────────────────── */
.lf-overlay{
  position:fixed;
  inset:0;
  background:rgba(19,20,74,0.55);
  backdrop-filter:blur(4px);
  z-index:100;
  display:none;
  align-items:flex-start;
  justify-content:center;
  padding:40px 20px;
  overflow-y:auto;
}
.lf-overlay.open{display:flex;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.lf-page{
  background:white;
  width:210mm;
  min-height:297mm;
  padding:22mm 22mm 20mm;
  box-shadow:0 25px 80px -20px rgba(0,0,0,0.4);
  position:relative;
  font-family:"DM Sans",sans-serif;
  color:var(--ink);
}
.lf-page-close{
  position:absolute;
  top:18px;
  right:20px;
  width:30px;
  height:30px;
  border-radius:50%;
  background:var(--paper-deep);
  border:1px solid var(--rule);
  cursor:pointer;
  font-size:16px;
  color:var(--navy);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}
.lf-page-close:hover{background:var(--navy);color:white;border-color:var(--navy)}

.lf-page-head{
  border-bottom:2px solid var(--navy);
  padding-bottom:14px;
  margin-bottom:18px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:16px;
}
.lf-page-eyebrow{
  font-size:10px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--gold-deep);
  font-weight:700;
  font-family:"DM Sans",sans-serif;
}
.lf-page-num{
  font-family:"Fraunces",serif;
  font-style:italic;
  font-size:13px;
  color:var(--mute);
  margin-top:6px;
}
.lf-page-title{
  font-family:"Fraunces",serif;
  font-weight:600;
  font-size:32px;
  letter-spacing:-0.015em;
  color:var(--navy);
  line-height:1.05;
  margin-top:4px;
}
.lf-page-sub{
  font-size:13px;
  color:var(--mute);
  margin-top:6px;
  font-style:italic;
}
.lf-page-icon{
  font-size:54px;
  opacity:0.85;
  line-height:1;
}

.lf-section{margin-bottom:14px}
.lf-section h3{
  font-family:"DM Sans",sans-serif;
  font-size:9.5px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  font-weight:700;
  color:var(--gold-deep);
  margin-bottom:5px;
  border-bottom:1px dotted var(--rule);
  padding-bottom:3px;
}
.lf-section p{font-size:11.5px;line-height:1.55;color:var(--ink)}
.lf-section ul{padding-left:18px;font-size:11.5px;line-height:1.6}
.lf-section li{margin-bottom:2px}
.lf-section li strong{color:var(--navy);font-weight:600}

.lf-twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.lf-redflag{
  background:rgba(176,90,53,0.07);
  border-left:3px solid var(--bronze);
  padding:8px 12px;
  font-size:11px;
  color:var(--bronze);
  margin-top:6px;
  font-weight:500;
}
.lf-tip{
  background:rgba(45,122,101,0.08);
  border-left:3px solid var(--green);
  padding:8px 12px;
  font-size:11px;
  color:#1d5446;
  margin-top:6px;
  font-style:italic;
}

.lf-page-foot{
  position:absolute;
  bottom:14mm;
  left:22mm;
  right:22mm;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:9px;
  color:var(--mute);
  letter-spacing:0.1em;
  text-transform:uppercase;
  border-top:1px solid var(--rule);
  padding-top:8px;
}
.lf-page-foot-mark{font-family:"Fraunces",serif;font-style:italic;text-transform:none;letter-spacing:0;color:var(--gold-deep)}

.lf-page-nav{
  display:flex;
  gap:8px;
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid var(--rule);
}
.lf-pagenav-btn{
  flex:1;
  background:white;
  border:1px solid var(--rule);
  padding:9px 12px;
  font-family:"DM Sans",sans-serif;
  font-size:10.5px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  font-weight:600;
  color:var(--navy);
  cursor:pointer;
  border-radius:2px;
  transition:all 0.15s;
}
.lf-pagenav-btn:hover:not(:disabled){background:var(--navy);color:white;border-color:var(--navy)}
.lf-pagenav-btn:disabled{opacity:0.35;cursor:not-allowed}
.lf-pagenav-btn.primary{background:var(--gold);color:var(--navy-deep);border-color:var(--gold);font-weight:700}
.lf-pagenav-btn.primary:hover{background:var(--gold-deep);color:white;border-color:var(--gold-deep)}

/* ─── PRINT MODE ──────────────────────────────────────────────────── */
@media print{
  body{background:white}
  .lf-header,.lf-routebar,.lf-chart-wrap{display:none!important}
  .lf-overlay{position:static;background:none;backdrop-filter:none;padding:0;display:block!important}
  .lf-page{
    box-shadow:none;
    page-break-after:always;
    width:100%;
    min-height:auto;
    padding:18mm 18mm 14mm;
  }
  .lf-page-close,.lf-page-nav{display:none}
  .print-all .lf-page{page-break-after:always}
}

/* Mobile responsiveness — collapses chart for narrow screens */
@media (max-width:780px){
  .lf-header{padding:18px 22px}
  .lf-routebar{padding:14px 22px}
  .lf-brand-name{font-size:18px}
  .lf-chart{padding:30px 22px 60px;min-width:auto}
  .lf-node{width:100%}
  .lf-row{flex-direction:column}
  .lf-page{width:100%;padding:18px}
}
</style>
</head>
<body>

<header class="lf-header">
  <div class="lf-brand">
    <div class="lf-brand-mark">L.</div>
    <div>
      <div class="lf-brand-name">Landform Process Chart</div>
      <div class="lf-brand-sub">Cassidy Group · Internal Reference</div>
    </div>
  </div>
  <div class="lf-version">v9.8 · 28 Stages</div>
</header>

<div class="lf-routebar">
  <span class="lf-routebar-label">Filter by Route</span>
  <div class="lf-routes" id="routeFilter">
    <button class="lf-route active" data-route="all">All Routes</button>
    <button class="lf-route" data-route="sfh">SFH</button>
    <button class="lf-route" data-route="btr">BTR</button>
    <button class="lf-route" data-route="pbsa">PBSA</button>
    <button class="lf-route" data-route="asset">Existing Asset (Fast Track)</button>
    <button class="lf-route" data-route="mix">Mixed Use</button>
  </div>
  <button class="lf-print-btn" onclick="printAll()">Print full manual</button>
</div>

<div class="lf-chart-wrap">
  <div class="lf-chart" id="chart"></div>
</div>

<div class="lf-overlay" id="overlay">
  <div class="lf-page" id="page"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────
// STAGE DATA — 28 stages of the Landform v9.8 workflow
// ─────────────────────────────────────────────────────────────────────
// Routes legend:
//   all = appears in every journey
//   sfh, btr, pbsa, asset, mix = route-specific

const STAGES = [
  // GROUP 0 — START
  {n:1, group:"0 · Start", icon:"⊕", title:"Sign In / Register",
   sub:"Account access, session control",
   routes:["all"],
   purpose:"Enter Landform. Either resume a saved deal from any device or set up a new account.",
   inputs:["Email address (unique identifier)","Password (8+ characters, hashed SHA-256 server-side)","On first run: name + company name"],
   sources:["Self-supplied"],
   outputs:["Authenticated session (30-day token)","Access to your private portfolio of saved deals"],
   validation:["Email must be unique on register","Password minimum 8 characters","Invalid credentials block sign-in"],
   redflags:["Sharing accounts across colleagues — each user must have their own login (audit trail integrity)"],
   tips:["Recommend a password manager for the team","Cassidy Group Limited account credentials are confidential business assets"],
   next:"Process Navigator (or open existing deal from Portfolio)"
  },
  {n:2, group:"0 · Start", icon:"🧭", title:"Process Navigator",
   sub:"Pick scheme · pick exit",
   routes:["all"],
   purpose:"The three-page guided journey that orients you before entering any data. Sets the scheme route and exit strategy that determines which downstream stages apply.",
   inputs:["Page 1: Scheme type — Land Strategy / SFH / BTR / PBSA / Existing Asset / Property / Recovery","Page 2: Most likely exit — Build & Sell / Land + Planning / Forward Fund / Build & Hold / Forward Sale / Block Sale","Page 3: confirms the workflow stages that apply to your route"],
   sources:["Your own commercial judgement"],
   outputs:["Sets data.assetType, data.exitChoice","Sidebar filters to show only relevant stages","Downstream calculations switch to scheme-appropriate logic (SFH PSF model vs BTR yield model)"],
   validation:["You can change scheme/exit mid-deal but it may invalidate populated stages","System warns before re-route if data exists"],
   redflags:["Picking the wrong scheme type at the start propagates assumption errors through every later stage"],
   tips:["If unsure between SFH and BTR, model SFH first — easier to convert appraisal","Existing Asset I Own = FAST TRACK to Asset Optimiser (skips acquisition + planning + build)"],
   next:"Find / Site Readiness, OR direct to Asset Optimiser if existing asset"
  },
  {n:3, group:"0 · Start", icon:"🏛", title:"Asset Exit Optimiser",
   sub:"FAST TRACK — for existing or completing assets",
   routes:["asset"],
   purpose:"Skip acquisition and planning entirely. For an asset Cassidy already owns or is acquiring complete. Compares every viable exit route side-by-side and surfaces optimal strategy by yield, IRR, or timing.",
   inputs:["Asset type: PBSA / BTR / SFH portfolio / Hotel / Pub / Industrial / Office / Retail / Single Residential / Mixed-use / Care / Data Centre / Other","Location tier: Prime / Regional","Stabilised NOI (or current NOI + months to stabilisation)","Cost base (acquisition + capex)","Existing debt + rate","Strategic priority: Cash now / Best IRR / Strategic value / Risk-off"],
   sources:["Internal financials","Rent roll / lease schedule","Most recent lender valuation","Knight Frank / CBRE / Savills sector reports for yield benchmarks"],
   outputs:["13 asset types × 17 exit routes filtered to viable combinations","Sector yield benchmarks (mid-2026: PBSA 4.75-6.5%, BTR 4-5.5%, Industrial 5-7%, Pub 7-11%)","Block accommodation mix module (PBSA + Key Worker + BTR + commercial blend)","Split-sale detector — flags when components sold separately beats single-block sale","AI strategic analysis with named UK institutional buyers"],
   validation:["Stabilised NOI must be positive","Cost base must be greater than zero","Asset type determines which exit routes are shown"],
   redflags:["Using stabilised NOI when asset is still in lease-up — overstates value","Ignoring sector-specific covenant/lease structures when comparing yields"],
   tips:["Set 'Months to stabilisation' realistically — stretching it doesn't help your model","Use Block Mix for any single building with multiple use classes — they have different yields"],
   next:"Exit Strategy → Reports → Investor Marketing Suite → Deal Executed"
  },

  // GROUP 1 — FIND
  {n:4, group:"1 · Find", icon:"🚪", title:"Site Readiness Check",
   sub:"Capture site fundamentals before progressing",
   routes:["all"],
   purpose:"Confirms the deal has enough basic site information to be worth working up. A discipline checkpoint — incomplete sites get parked, not analysed.",
   inputs:["Site address (full postal address)","Site boundary (red line plan, even if approximate)","Acreage (or m² / hectares)","Ownership status: Owned / Optioned / Under offer / Targeted","Planning context: Allocated / Outside settlement / Brownfield / Greenbelt","Access provision: Adopted highway / Private / Ransom strip","Known constraints headline"],
   sources:["HM Land Registry Title Plan (£3 from gov.uk/search-property-information)","Local Plan policies map","Site visit notes","Vendor / agent particulars"],
   outputs:["Goes into data.land — feeds every downstream stage","Anchors the rest of the workflow"],
   validation:["Address + acreage minimum to proceed","Boundary recommended even if rough","Without ownership clarity, model is theoretical"],
   redflags:["No access provision identified = ransom strip risk","Site within designated landscape (AONB / Green Belt / Conservation Area) without strategy","Title plan not yet checked for restrictions or covenants"],
   tips:["10 minutes downloading the Title Register pays off hundreds of times over","Photograph the site visit — useful for Teaser pack later","If targeting only, mark as 'speculative' to filter Portfolio later"],
   next:"Placona Agent (if site-finding) OR straight to Land Appraisal (if site known)"
  },
  {n:5, group:"1 · Find", icon:"🤖", title:"Placona Agent",
   sub:"AI land sourcing across the UK",
   routes:["all"],
   purpose:"Discovers off-market and on-market development sites matching scheme criteria. Covers 74 UK areas across 12 regions.",
   inputs:["Scheme type (auto from Process Navigator)","Minimum units required","Selected counties/regions (multi-select)","Deep Research mode toggle (slower, broader)"],
   sources:["Live web research via Claude AI","Land agency listings","Council planning applications","CoStar / EG / Rightmove development pages"],
   outputs:["10-15 development sites per search","Each result: address, postcode, acres, units, indicative price, LPA, planning status, agent contact, key constraints, source URL","One-click 'Load Deal' auto-populates 12 downstream stages"],
   validation:["Minimum units must be > 0","At least one county must be selected","Deep Research mode requires longer wait (~30 seconds)"],
   redflags:["Always verify pricing — Placona's figures are indicative, sourced from open data","Some 'available' sites may be under offer not yet reflected in listings"],
   tips:["Use the M1/M6 Corridor preset for Cassidy's Midlands focus","Whole UK search good for first scan, then re-run with specific region","Use Planning Monitor afterwards to track pre-app activity in your shortlist"],
   next:"Site Readiness Check (for each shortlisted site) → Land Appraisal"
  },
  {n:6, group:"1 · Find", icon:"🛰", title:"Planning Monitor",
   sub:"Watch nearby applications & pre-apps",
   routes:["all"],
   purpose:"Tracks live planning activity around your site. Identifies competition, comparables, and emerging market intelligence.",
   inputs:["Postcode or LPA area","Radius (default 1 mile)","Application type filter (Full / Outline / Reserved Matters / Pre-app)","Date range"],
   sources:["LPA online planning portals (live scraped via AI)","Planning Inspectorate appeals database","Local press releases"],
   outputs:["List of recent applications by address","Status: Approved / Refused / Pending / Appeal","Application descriptions, decision dates","Comparable consents in pipeline"],
   validation:["Postcode must be valid UK format","Some LPAs have weaker online portals — results vary"],
   redflags:["Recent refusals on similar schemes within 1 mile = policy risk signal","Appeals running on adjacent sites may set precedent"],
   tips:["Run after Site Readiness — informs your Planning & Viability stage","Print results for the Risk Register"],
   next:"Constraint Check"
  },
  {n:7, group:"1 · Find", icon:"⚠", title:"Constraint Check",
   sub:"Designation overlays, environmental, infrastructure",
   routes:["all"],
   purpose:"Reveals statutory and physical constraints that affect developability — from flood zones to listed buildings to grid connections.",
   inputs:["Site coordinates or address","Layers to check (default: all major)"],
   sources:["Environment Agency flood maps","Natural England designations (SSSI / SAC / SPA)","Historic England (listed buildings, conservation areas)","Ofgem / DNO capacity statements","Coal Authority","UK Power Networks etc."],
   outputs:["Visual summary of constraints","Mitigation options where flagged","Priority rating — show-stopper vs design constraint vs negligible"],
   validation:["Postcode must resolve to coordinates","Some layers update quarterly — note check date"],
   redflags:["Flood Zone 3a/3b without sequential test passed = high refusal risk","Listed building within 100m = setting impact assessment needed","No grid capacity within 5km of large scheme = STOP"],
   tips:["Save the constraint summary PDF — required for Due Diligence pack","Flag any flagged items to Risk Register"],

// GROUP STRUCTURE
// ─────────────────────────────────────────────────────────────────────
const GROUPS = [
  "0 · Start",
  "1 · Find",
  "2 · Value",
  "3 · Develop",
  "4 · Exit",
  "5 · Report",
  "6 · Market & Manage"
];

// ─────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────
let currentRoute = "all";
let currentStage = null;

// ─────────────────────────────────────────────────────────────────────
// RENDER FLOWCHART
// ─────────────────────────────────────────────────────────────────────
function renderChart(){
  const chart = document.getElementById("chart");
  chart.innerHTML = "";
  
  GROUPS.forEach((groupName, idx) => {
    const groupDiv = document.createElement("div");
    groupDiv.className = "lf-group";
    
    const label = document.createElement("div");
    label.className = "lf-group-label";
    const [num, ...nameParts] = groupName.split(" · ");
    label.innerHTML = `<span class="lf-group-num">${num}</span>${nameParts.join(" · ")}`;
    groupDiv.appendChild(label);
    
    const row = document.createElement("div");
    row.className = "lf-row";
    
    const stages = STAGES.filter(s => s.group === groupName);
    stages.forEach(stage => {
      const node = document.createElement("div");
      const isVisible = currentRoute === "all" || stage.routes.includes("all") || stage.routes.includes(currentRoute);
      node.className = "lf-node" + (isVisible ? "" : " faded");
      
      // Decision / gate / fast styling
      if(stage.title.includes("Readiness")) node.classList.add("gate");
      if(stage.title.includes("Recovery")) node.classList.add("decision");
      if(stage.routes.length === 1 && stage.routes[0] === "asset") node.classList.add("fast");
      
      node.innerHTML = `
        <div class="lf-node-icon">${stage.icon}</div>
        <div class="lf-node-num">Stage ${stage.n}</div>
        <div class="lf-node-title">${stage.title}</div>
        <div class="lf-node-sub">${stage.sub}</div>
        <div class="lf-node-route-tags">
          ${stage.routes.map(r => `<span class="lf-tag ${r==='all'?'':r}">${r==='all'?'all routes':r.toUpperCase()}</span>`).join("")}
        </div>
      `;
      node.addEventListener("click", () => {
        if(isVisible) openStage(stage.n);
      });
      row.appendChild(node);
    });
    
    groupDiv.appendChild(row);
    chart.appendChild(groupDiv);
    
    if(idx < GROUPS.length - 1){
      const arrow = document.createElement("div");
      arrow.className = "lf-arrow";
      arrow.textContent = "↓";
      chart.appendChild(arrow);
    }
  });
}

// ─────────────────────────────────────────────────────────────────────
// RENDER DETAIL PAGE
// ─────────────────────────────────────────────────────────────────────
function openStage(n){
  const stage = STAGES.find(s => s.n === n);
  if(!stage) return;
  currentStage = n;
  
  const page = document.getElementById("page");
  const [grpNum, ...grpName] = stage.group.split(" · ");
  
  // Find previous & next in current route view
  const visibleStages = STAGES.filter(s => currentRoute === "all" || s.routes.includes("all") || s.routes.includes(currentRoute));
  const idx = visibleStages.findIndex(s => s.n === n);
  const prev = idx > 0 ? visibleStages[idx-1] : null;
  const next = idx < visibleStages.length - 1 ? visibleStages[idx+1] : null;
  
  page.innerHTML = `
    <button class="lf-page-close" onclick="closeStage()" aria-label="Close">×</button>
    <div class="lf-page-head">
      <div>
        <div class="lf-page-eyebrow">Group ${grpNum} · ${grpName.join(" · ")}</div>
        <div class="lf-page-num">Stage ${stage.n} of ${STAGES.length}</div>
        <div class="lf-page-title">${stage.title}</div>
        <div class="lf-page-sub">${stage.sub}</div>
      </div>
      <div class="lf-page-icon">${stage.icon}</div>
    </div>
    
    <div class="lf-section">
      <h3>Purpose</h3>
      <p>${stage.purpose}</p>
    </div>
    
    <div class="lf-twocol">
      <div class="lf-section">
        <h3>What you enter</h3>
        <ul>${stage.inputs.map(i => `<li>${i}</li>`).join("")}</ul>
      </div>
      <div class="lf-section">
        <h3>Where to find it</h3>
        <ul>${stage.sources.map(s => `<li>${s}</li>`).join("")}</ul>
      </div>
    </div>
    
    <div class="lf-section">
      <h3>What it produces</h3>
      <ul>${stage.outputs.map(o => `<li>${o}</li>`).join("")}</ul>
    </div>
    
    <div class="lf-twocol">
      <div class="lf-section">
        <h3>Validation rules</h3>
        <ul>${stage.validation.map(v => `<li>${v}</li>`).join("")}</ul>
      </div>
      <div class="lf-section">
        <h3>Red flags</h3>
        <ul>${stage.redflags.map(r => `<li>${r}</li>`).join("")}</ul>
      </div>
    </div>
    
    ${stage.tips && stage.tips.length ? `
    <div class="lf-section">
      <h3>Tips from experience</h3>
      <ul>${stage.tips.map(t => `<li>${t}</li>`).join("")}</ul>
    </div>` : ""}
    
    <div class="lf-tip"><strong>Routes:</strong> ${stage.routes.map(r => r === "all" ? "All routes" : r.toUpperCase()).join(" · ")} &nbsp;|&nbsp; <strong>Next stage:</strong> ${stage.next}</div>
    
    <div class="lf-page-nav">
      <button class="lf-pagenav-btn" ${!prev?"disabled":""} onclick="${prev?`openStage(${prev.n})`:""}">← ${prev ? prev.title : "Start of route"}</button>
      <button class="lf-pagenav-btn primary" onclick="printStage()">Print this page</button>
      <button class="lf-pagenav-btn" ${!next?"disabled":""} onclick="${next?`openStage(${next.n})`:""}">${next ? next.title : "End of route"} →</button>
    </div>
    
    <div class="lf-page-foot">
      <span>Landform v9.8 · Internal Reference</span>
      <span class="lf-page-foot-mark">Cassidy Group</span>
      <span>Stage ${stage.n} / ${STAGES.length}</span>
    </div>
  `;
  
  document.getElementById("overlay").classList.add("open");
  document.getElementById("page").scrollTop = 0;
}

function closeStage(){
  document.getElementById("overlay").classList.remove("open");
  currentStage = null;
}

// ─────────────────────────────────────────────────────────────────────
// PRINTING
// ─────────────────────────────────────────────────────────────────────
function printStage(){
  // Single page print — already in overlay
  window.print();
}

function printAll(){
  // Build all pages in the overlay then print
  const overlay = document.getElementById("overlay");
  const page = document.getElementById("page");
  
  // Stash old content
  const oldContent = page.innerHTML;
  
  // Build all pages stacked
  let html = "";
  STAGES.forEach(stage => {
    const [grpNum, ...grpName] = stage.group.split(" · ");
    html += `<div class="lf-page" style="page-break-after:always">
      <div class="lf-page-head">
        <div>
          <div class="lf-page-eyebrow">Group ${grpNum} · ${grpName.join(" · ")}</div>
          <div class="lf-page-num">Stage ${stage.n} of ${STAGES.length}</div>
          <div class="lf-page-title">${stage.title}</div>
          <div class="lf-page-sub">${stage.sub}</div>
        </div>
        <div class="lf-page-icon">${stage.icon}</div>
      </div>
      <div class="lf-section"><h3>Purpose</h3><p>${stage.purpose}</p></div>
      <div class="lf-twocol">
        <div class="lf-section"><h3>What you enter</h3><ul>${stage.inputs.map(i => `<li>${i}</li>`).join("")}</ul></div>
        <div class="lf-section"><h3>Where to find it</h3><ul>${stage.sources.map(s => `<li>${s}</li>`).join("")}</ul></div>
      </div>
      <div class="lf-section"><h3>What it produces</h3><ul>${stage.outputs.map(o => `<li>${o}</li>`).join("")}</ul></div>
      <div class="lf-twocol">
        <div class="lf-section"><h3>Validation rules</h3><ul>${stage.validation.map(v => `<li>${v}</li>`).join("")}</ul></div>
        <div class="lf-section"><h3>Red flags</h3><ul>${stage.redflags.map(r => `<li>${r}</li>`).join("")}</ul></div>
      </div>
      ${stage.tips && stage.tips.length ? `<div class="lf-section"><h3>Tips from experience</h3><ul>${stage.tips.map(t => `<li>${t}</li>`).join("")}</ul></div>` : ""}
      <div class="lf-tip"><strong>Routes:</strong> ${stage.routes.map(r => r === "all" ? "All routes" : r.toUpperCase()).join(" · ")} &nbsp;|&nbsp; <strong>Next stage:</strong> ${stage.next}</div>
      <div class="lf-page-foot">
        <span>Landform v9.8 · Internal Reference</span>
        <span class="lf-page-foot-mark">Cassidy Group</span>
        <span>Stage ${stage.n} / ${STAGES.length}</span>
      </div>
    </div>`;
  });
  
  page.outerHTML = html;
  overlay.classList.add("open");
  setTimeout(() => {
    window.print();
    // Restore after print
    setTimeout(() => location.reload(), 500);
  }, 200);
}

// ─────────────────────────────────────────────────────────────────────
// ROUTE FILTER
// ─────────────────────────────────────────────────────────────────────
document.getElementById("routeFilter").addEventListener("click", e => {
  if(e.target.matches("button[data-route]")){
    currentRoute = e.target.dataset.route;
    document.querySelectorAll("#routeFilter button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    renderChart();
  }
});

// ─────────────────────────────────────────────────────────────────────
// KEYBOARD NAVIGATION
// ─────────────────────────────────────────────────────────────────────
document.addEventListener("keydown", e => {
  if(currentStage){
    if(e.key === "Escape") closeStage();
    if(e.key === "ArrowRight"){
      const next = STAGES.find(s => s.n === currentStage + 1);
      if(next) openStage(next.n);
    }
    if(e.key === "ArrowLeft"){
      const prev = STAGES.find(s => s.n === currentStage - 1);
      if(prev) openStage(prev.n);
    }
  }
});

// Click outside to close
document.getElementById("overlay").addEventListener("click", e => {
  if(e.target.id === "overlay") closeStage();
});

renderChart();
</script>
</body>
</html>
