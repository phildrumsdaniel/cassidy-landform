# Builds and deploys the Highlands Adventure PWA (in highlands-app/) into a
# /highlands/ sub-directory on the main branch. This serves the app alongside
# the existing landform site under the SAME GitHub Pages setup — no Pages
# source change is needed, and the landform files are never touched
# (keep_files: true only adds/updates files under highlands/).
#
# Result URL: https://<owner>.github.io/cassidy-landform/highlands/
name: Deploy Highlands PWA

on:
  push:
    branches: [main]
    paths:
      - 'highlands-app/**'
      - '.github/workflows/highlands-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: highlands-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: highlands-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: highlands-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Fetch POI photos from Wikimedia Commons
        run: npm run fetch-photos
        # Commons is reachable from GitHub-hosted runners. If it ever fails,
        # the app still builds and falls back to placeholders.
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Publish built app into main/highlands
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          # Replace only the highlands/ sub-directory; landform files at the
          # repo root are never touched. Built output goes to main so the app
          # serves under the same Pages setup as the landform site — no Pages
          # source change required.
          rm -rf highlands
          mkdir -p highlands
          cp -r highlands-app/dist/. highlands/
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add highlands
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            # [skip ci] keeps this deploy commit from re-triggering workflows.
            git commit -m 'Deploy Highlands PWA to /highlands/ [skip ci]'
            git push origin HEAD:main
          fi
