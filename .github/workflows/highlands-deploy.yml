# Builds and deploys the Highlands Adventure PWA (in highlands-app/) into a
# /highlands/ sub-directory on the main branch. This serves the app alongside
# the existing landform site under the SAME GitHub Pages setup — no Pages
# source change is needed, and the landform files are never touched
# (keep_files: true only adds/updates files under highlands/).
#
# Result URL: https://<owner>.github.io/cassidy-landform/highlands/
name: Deploy Highlands PWA

on:
  push:
    branches: [main]
    paths:
      - 'highlands-app/**'
      - '.github/workflows/highlands-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: highlands-pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: highlands-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: highlands-app/package-lock.json

      - name: Install
        run: npm ci

      - name: Fetch POI photos from Wikimedia Commons
        run: npm run fetch-photos
        # Commons is reachable from GitHub-hosted runners. If it ever fails,
        # the app still builds and falls back to placeholders.
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Deploy to main/highlands
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: main
          publish_dir: highlands-app/dist
          destination_dir: highlands
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'Deploy Highlands PWA to /highlands/ [skip ci]'
