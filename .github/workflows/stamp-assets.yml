name: Stamp asset versions

# Automatically appends a content-hash ?v= to every local script/style in
# index.html on each push, so browsers always fetch changed files and never
# serve stale cached JS — without anyone having to hard-refresh.
#
# The stamping commit is made with "[skip ci]" in its message so it does not
# retrigger this workflow (no infinite loop).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: stamp-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stamp:
    # Don't run on the bot's own stamping commit.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stamp index.html asset versions
        run: node stamp-build.js

      - name: Commit if changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No version changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: stamp asset versions [skip ci]"
          git push
