<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cassidy Group — Land & Development Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@17/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:#F4F5F9}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ─── ACCESS CONTROL CONFIG ────────────────────────────────────────────────────
// Passwords are stored ONLY in your Google Sheet — not here.
// Paste your Google Apps Script Web App URL below after deployment.
const ACCESS_CONFIG = {
  expiryDate: "2027-12-31",
  sheetWebhook: "https://script.google.com/macros/s/AKfycbz1_KT5gj1rsO5OuwAivh0U6TyXQ1zFSu58Sd5sRpCQ0cGWSzVl4u0wz0MLbQk2Xv6q/exec",
};

// ─── LOGGING ENGINE ───────────────────────────────────────────────────────────
const logEvent = async (user, eventType, details) => {
  if (!ACCESS_CONFIG.sheetWebhook || ACCESS_CONFIG.sheetWebhook.includes("YOUR_GOOGLE")) return;
  try {
    // Truncate and clean details for logging
    let detailStr = "";
    if (typeof details === "object") {
      // Extract the most useful fields only
      const useful = {};
      const keys = ["postcode","city","acres","price","units","stage","result","url","address","schType","gdv","rlv","margin"];
      keys.forEach(k => { if (details[k] !== undefined && details[k] !== "" && details[k] !== null) useful[k] = details[k]; });
      detailStr = JSON.stringify(useful).substring(0, 500);
    } else {
      detailStr = String(details).substring(0, 500);
    }
    const params = new URLSearchParams({
      action: "log",
      timestamp: new Date().toISOString(),
      user: user?.name || "Unknown",
      company: user?.company || "Unknown",
      role: user?.role || "demo",
      event: eventType,
      details: detailStr,
      userAgent: navigator.userAgent.substring(0, 80),
    });
    fetch(ACCESS_CONFIG.sheetWebhook + "?" + params.toString()).catch(()=>{});
  } catch(e) { /* silent */ }
};

// Log page navigation
const logPageView = (user, stageName) => {
  logEvent(user, "PAGE_VIEW", { stage: stageName });
};

// Log field data entry (called when key fields are filled)
const logFieldData = (user, stage, fields) => {
  logEvent(user, "FIELD_DATA", { stage, ...fields });
};

// Log AI result (truncated)
const logAIResult = (user, stage, prompt, result) => {
  logEvent(user, "RESULT", {
    stage,
    result: (result||"").substring(0, 400)
  });
};

// ─── DEAL STORAGE HELPERS ────────────────────────────────────────────────────
const DEALS_KEY = "cassidy_landform_deals_v1";

const loadDeals = () => {
  try {
    const raw = localStorage.getItem(DEALS_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
};

const saveDeals = (deals) => {
  try { localStorage.setItem(DEALS_KEY, JSON.stringify(deals)); } catch(e) {}
};

// ─── DEAL MANAGER COMPONENT ───────────────────────────────────────────────────
const DealManager = ({ user, onOpen, onNew }) => {
  const [deals, setDeals] = React.useState(loadDeals);
  const [filter, setFilter] = React.useState("active");
  const [search, setSearch] = React.useState("");

  const updateDeal = (id, updates) => {
    const updated = deals.map(d => d.id === id ? {...d, ...updates, updatedAt: new Date().toISOString()} : d);
    setDeals(updated); saveDeals(updated);
  };

  const deleteDeal = (id) => {
    if (!window.confirm("Delete this deal permanently?")) return;
    const updated = deals.filter(d => d.id !== id);
    setDeals(updated); saveDeals(updated);
  };

  const filtered = deals
    .filter(d => filter === "all" ? true : filter === "active" ? d.status !== "archived" : d.status === "archived")
    .filter(d => !search || (d.name||"").toLowerCase().includes(search.toLowerCase()) || (d.address||"").toLowerCase().includes(search.toLowerCase()));

  const statusColors = { active:"#2D7A65", reviewing:"#9A7B3E", archived:"#7278A0", paused:"#B05A35" };

  return (
    <div style={{minHeight:"100vh",background:"#F4F5F9",fontFamily:"DM Sans,sans-serif"}}>
      {/* Header */}
      <div style={{background:"#1E1F5C",padding:"20px 32px",display:"flex",alignItems:"center",gap:16}}>
        <img src={"data:image/webp;base64,"+CASSIDY_LOGO} alt="Cassidy Group" style={{width:80,height:"auto",filter:"drop-shadow(0 1px 4px rgba(0,0,0,0.3))"}}/> 
        <div>
          <div style={{color:"#fff",fontSize:18,fontWeight:800,letterSpacing:".02em"}}>Land Intelligence</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,letterSpacing:".15em",textTransform:"uppercase"}}>Deal Management</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:12}}>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:12}}>Welcome, {user?.name}</div>
          <button onClick={onNew} style={{padding:"9px 20px",background:"#EDE84A",border:"none",borderRadius:6,color:"#1E1F5C",fontSize:13,fontWeight:800,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
            + New Deal
          </button>
        </div>
      </div>

      <div style={{padding:"28px 32px",maxWidth:1100,margin:"0 auto"}}>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          {[
            {l:"Total Deals",   v:deals.length,                          c:"var(--cb)"},
            {l:"Active",        v:deals.filter(d=>d.status==="active"||!d.status).length, c:"#2D7A65"},
            {l:"Under Review",  v:deals.filter(d=>d.status==="reviewing").length, c:"#9A7B3E"},
            {l:"Archived",      v:deals.filter(d=>d.status==="archived").length,  c:"#7278A0"},
          ].map(({l,v,c})=>(
            <div key={l} style={{background:"#fff",border:"1px solid #DDE0ED",borderRadius:10,padding:"16px 18px"}}>
              <div style={{fontSize:9,color:"#7278A0",textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>{l}</div>
              <div style={{fontSize:28,fontWeight:800,color:c,lineHeight:1}}>{v}</div>
            </div>
          ))}
        </div>

        {/* Filters + Search */}
        <div style={{display:"flex",gap:12,marginBottom:16,alignItems:"center"}}>
          <div style={{display:"flex",gap:6}}>
            {[["active","Active"],["reviewing","Reviewing"],["archived","Archived"],["all","All"]].map(([val,label])=>(
              <button key={val} onClick={()=>setFilter(val)} style={{padding:"6px 14px",border:`1px solid ${filter===val?"var(--cb)":"#DDE0ED"}`,background:filter===val?"var(--cb)":"#fff",color:filter===val?"#fff":"#7278A0",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>{label}</button>
            ))}
          </div>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search deals..." style={{flex:1,padding:"8px 12px",border:"1px solid #DDE0ED",borderRadius:6,fontSize:12,fontFamily:"DM Sans,sans-serif",outline:"none"}}/>
        </div>

        {/* Deal Cards */}
        {filtered.length === 0 ? (
          <div style={{background:"#fff",border:"1px solid #DDE0ED",borderRadius:12,padding:"48px",textAlign:"center"}}>
            <div style={{fontSize:32,marginBottom:12}}>🏗</div>
            <div style={{fontSize:16,fontWeight:700,color:"#2E2F8A",marginBottom:8}}>{deals.length===0?"No deals yet":"No deals match your filter"}</div>
            <div style={{fontSize:13,color:"#7278A0",marginBottom:20}}>Click New Deal to start your first land appraisal</div>
            <button onClick={onNew} style={{padding:"10px 24px",background:"var(--cb)",border:"none",borderRadius:6,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>+ New Deal</button>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {filtered.map(deal=>(
              <div key={deal.id} style={{background:"#fff",border:"1px solid #DDE0ED",borderRadius:10,padding:"18px 20px",display:"grid",gridTemplateColumns:"1fr auto",gap:16,alignItems:"center",transition:"box-shadow .15s",cursor:"pointer"}}
                onMouseOver={e=>e.currentTarget.style.boxShadow="0 2px 12px rgba(74,75,174,0.1)"}
                onMouseOut={e=>e.currentTarget.style.boxShadow="none"}>
                <div onClick={()=>onOpen(deal)}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:5}}>
                    <span style={{fontSize:15,fontWeight:800,color:"#2E2F8A"}}>{deal.name||"Untitled Deal"}</span>
                    <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:3,background:`${statusColors[deal.status||"active"]}15`,color:statusColors[deal.status||"active"]}}>{(deal.status||"active").toUpperCase()}</span>
                    {deal.assetType&&<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:3,background:"rgba(74,75,174,0.08)",color:"var(--cb)"}}>{deal.assetType.toUpperCase()}</span>}
                  </div>
                  <div style={{fontSize:12,color:"#7278A0",marginBottom:4}}>{deal.address||deal.land?.address||"Address not set"}{deal.land?.city&&" · "+deal.land.city.replace(/_/g," ").replace(/\w/g,l=>l.toUpperCase())}</div>
                  <div style={{display:"flex",gap:16,fontSize:11,color:"#A0A4C0"}}>
                    {deal.land?.acres&&<span>📐 {deal.land.acres} acres</span>}
                    {deal.land?.price&&<span>💰 £{Number(deal.land.price).toLocaleString()}</span>}
                    {deal.planning?.units&&<span>🏠 {deal.planning.units} units</span>}
                    <span>🕐 {deal.updatedAt ? new Date(deal.updatedAt).toLocaleDateString("en-GB") : new Date(deal.createdAt||Date.now()).toLocaleDateString("en-GB")}</span>
                    {deal.notes&&<span>📝 Has notes</span>}
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <button onClick={()=>onOpen(deal)} style={{padding:"7px 14px",background:"var(--cb)",border:"none",borderRadius:5,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>Open →</button>
                  <select value={deal.status||"active"} onChange={e=>updateDeal(deal.id,{status:e.target.value})} onClick={e=>e.stopPropagation()} style={{padding:"6px 8px",border:"1px solid #DDE0ED",borderRadius:5,fontSize:11,fontFamily:"DM Sans,sans-serif",cursor:"pointer",background:"#fff"}}>
                    <option value="active">Active</option>
                    <option value="reviewing">Reviewing</option>
                    <option value="paused">Paused</option>
                    <option value="archived">Archive</option>
                  </select>
                  <button onClick={e=>{e.stopPropagation();deleteDeal(deal.id);}} style={{padding:"7px 10px",background:"transparent",border:"1px solid #DDE0ED",borderRadius:5,color:"#B05A35",fontSize:11,cursor:"pointer"}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

// ─── WRAPPER APP WITH ACCESS CONTROL + DEAL MANAGEMENT ────────────────────────
const AppWithAccess = () => {
  const [user, setUser] = React.useState(null);
  const [view, setView] = React.useState("manager"); // "manager" | "deal"
  const [currentDeal, setCurrentDeal] = React.useState(null);
  const [deals, setDeals] = React.useState(loadDeals);

  const handleLogin = (u) => { setUser(u); setView("manager"); };

  const openDeal = (deal) => { setCurrentDeal(deal); setView("deal"); };

  const newDeal = () => {
    const deal = {
      id: Date.now(),
      name: "New Deal — " + new Date().toLocaleDateString("en-GB"),
      status: "active",
      assetType: "btr",
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    const updated = [deal, ...deals];
    setDeals(updated); saveDeals(updated);
    setCurrentDeal(deal); setView("deal");
  };

  const saveDeal = (data) => {
    // Auto-save deal data whenever it changes
    const updated = deals.map(d => d.id === currentDeal.id ? {
      ...d, ...data,
      id: currentDeal.id,
      name: data.dealName || d.name,
      address: data.land?.address || d.address,
      updatedAt: new Date().toISOString(),
    } : d);
    setDeals(updated);
    saveDeals(updated);
    setCurrentDeal(prev => ({...prev, ...data, name: data.dealName || prev.name}));
  };

  if (!user) return React.createElement(AccessGate, { onLogin: handleLogin });

  if (view === "manager") return React.createElement(DealManager, {
    user, onOpen: openDeal, onNew: newDeal,
  });

  return (
    <div>
      {/* Back to Deal Manager bar */}
      <div style={{background:"#1E1F5C",padding:"8px 24px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:999}}>
        <button onClick={()=>setView("manager")} style={{padding:"5px 12px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:4,color:"rgba(255,255,255,0.7)",fontSize:11,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}}>
          ← All Deals
        </button>
        <input
          value={currentDeal?.name||""}
          onChange={e=>{
            const updated = deals.map(d=>d.id===currentDeal.id?{...d,name:e.target.value,updatedAt:new Date().toISOString()}:d);
            setDeals(updated); saveDeals(updated);
            setCurrentDeal(prev=>({...prev,name:e.target.value}));
          }}
          style={{background:"transparent",border:"none",color:"#fff",fontSize:14,fontWeight:700,fontFamily:"DM Sans,sans-serif",outline:"none",flex:1,minWidth:200}}
          placeholder="Deal name..."
        />
        <span style={{fontSize:11,color:"rgba(255,255,255,0.35)"}}>Auto-saved · {currentDeal?.updatedAt?new Date(currentDeal.updatedAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"—"}</span>
        <select value={currentDeal?.status||"active"} onChange={e=>{
          const updated = deals.map(d=>d.id===currentDeal.id?{...d,status:e.target.value,updatedAt:new Date().toISOString()}:d);
          setDeals(updated); saveDeals(updated);
          setCurrentDeal(prev=>({...prev,status:e.target.value}));
        }} style={{padding:"4px 8px",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:4,color:"#fff",fontSize:11,fontFamily:"DM Sans,sans-serif",cursor:"pointer"}}>
          <option value="active">● Active</option>
          <option value="reviewing">● Reviewing</option>
          <option value="paused">● Paused</option>
          <option value="archived">● Archive</option>
        </select>
      </div>
      {React.createElement(App, {
        currentUser: user,
        data: currentDeal || {},
        setData: saveDeal,
        logEvent,
      })}
    </div>
  );

  const clean = pc.toUpperCase().replace(/\s/g,"");

  for (let len = 4; len >= 2; len--) {
    const key = clean.substring(0, len);
    if (PC_CITY[key]) {

  }
  return null;
};

  const run = async () => {
    setLoad(true); setDone(false); setRes("");
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true",},
        body:JSON.stringify({action:"ai",model:"claude-sonnet-4-20250514",max_tokens:900,system:SYSTEM_PROMPT,
          messages:[{role:"user",content:`${prompt}\n\nData: ${JSON.stringify(ctx)}`}]})
      });
      const d = await r.json();
      setRes(d.content?.find(b=>b.type==="text")?.text || "No response.");
    } catch { setRes("Analysis failed — check connection."); }
    setLoad(false); setDone(true);
  };
  return (
    <div className="ai-wrap">
      <button className="ai-btn" onClick={run} disabled={load}>
        {load?<><span className="spin"/>Analysing...</>:done?"↻ Re-analyse":label}
      </button>
      {res&&<div className="ai-box"><pre className="ai-txt">{res}</pre></div>}
      {load&&<div className="ai-box"><div className="ai-load"><span className="spin"/>Processing...</div></div>}
    </div>
  );
};

const LandScraper = ({ data, setData, setActive }) => {

  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState("");
  const [imported, setImported] = React.useState(false);
  const [pipeline, setPipeline] = React.useState(data.pipeline || []);

  const SOURCES = [
    { name:"Bruton Knowles",  url:"https://www.brutonknowles.co.uk/property-search/strategic-land/", hint:"Strategic land listings" },
    { name:"Savills Land",    url:"https://www.savills.co.uk/search/#?country=gb&Type=SL&SearchType=2", hint:"UK land for sale" },
    { name:"Knight Frank",    url:"https://www.knightfrank.co.uk/land-for-sale", hint:"Development land" },
    { name:"Aston Rose",      url:"https://www.astonrose.co.uk/properties/land-development/", hint:"London & SE land" },
    { name:"Rightmove Land",  url:"https://www.rightmove.co.uk/commercial-property-for-sale/land.html", hint:"All UK land listings" },
    { name:"Planning Portal", url:"https://www.planningportal.co.uk/", hint:"Planning applications" },
    { name:"LandInsight",     url:"https://app.landinsight.io/", hint:"Off-market land data" },
    { name:"EPC Register",    url:"https://find-energy-certificate.service.gov.uk/", hint:"Property energy data" },

  const scrape = async () => {
    if (!url.trim()) { setError("Please enter a URL"); return; }
    setLoading(true); setError(""); setResult(null); setImported(false);

    try {
      // Use Claude AI via Apps Script to scrape and extract structured data
      const prompt = `You are a UK land and property data extraction specialist. 
      
I need you to extract structured data from this land/property listing URL: ${url}

Fetch the page content and extract ALL of these fields if present:
- address: full property address
- postcode: UK postcode (e.g. WR2 5SJ)
- city: nearest city or town
- acreage: site area in acres (number only)
- hectares: site area in hectares (number only)  
- askingPrice: asking price in £ (number only, no symbols)
- priceType: "fixed", "oieo" (offers in excess of), "informal tender", "option", "promotion", "expression of interest"
- planningStatus: current planning status
- localAuthority: local planning authority name
- propertyType: type of land/property
- description: 2-3 sentence summary of the opportunity
- agent: selling agent name
- agentContact: agent contact email or phone
- dealType: "sale", "option", "promotion", "hybrid"
- developmentPotential: what could be built (e.g. "residential", "mixed use", "commercial")
- estimatedUnits: estimated number of dwellings if mentioned
- constraints: any planning constraints mentioned
- source: the website domain

If you cannot fetch the URL directly, extract as much as possible from the URL structure itself and return what you can.

IMPORTANT: Return ONLY a valid JSON object, no markdown, no explanation. Example:
{"address":"Land at Main Street, Bretforton, Evesham, Worcestershire","postcode":"WR11 7JH","city":"Evesham","acreage":3.52,"hectares":1.42,"askingPrice":null,"priceType":"informal tender","planningStatus":"No consent","localAuthority":"Wychavon District Council","propertyType":"Strategic Land","description":"Agricultural grassland in village centre. Site of 3.52 acres bordered by three roads. Unconditional freehold sale.","agent":"Bruton Knowles","agentContact":"bryn.evans@brutonknowles.co.uk","dealType":"sale","developmentPotential":"residential","estimatedUnits":null,"constraints":"Village location, edge of settlement","source":"brutonknowles.co.uk"}`;

      const res = await fetch(ACCESS_CONFIG.sheetWebhook + "?" + new URLSearchParams({
        action: "verify", password: "scrape_internal", name: "system", company: "system", userAgent: "scraper"
      }));
      
      // Use AI to scrape via Apps Script proxy
      const aiRes = await fetch(ACCESS_CONFIG.sheetWebhook + "?" + new URLSearchParams({
        action: "scrape",
        url: url,
        userAgent: navigator.userAgent.substring(0,80),
      }));
      
      let extracted = null;
      try {
        const aiData = await aiRes.json();
        if (aiData.status === "ok" && aiData.data) {
          extracted = aiData.data;
        }
      } catch(e) {}

      // Fallback: use Claude directly via the AI panel approach
      if (!extracted) {
        const aiPromptRes = await fetch(ACCESS_CONFIG.sheetWebhook, {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            action: "ai",
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: "You are a UK land data extraction specialist. Return only valid JSON, no markdown.",
            messages: [{ role: "user", content: prompt }],
            user: data.currentUser?.name || "User",
            company: data.currentUser?.company || "",
            stage: "Land Scraper",
            logDetails: "URL scraped: " + url,
          })
        });
        const aiResult = await aiPromptRes.json();
        if (aiResult.status === "ok" && aiResult.content) {
          const text = aiResult.content.find(b => b.type === "text")?.text || "";
          const clean = text.replace(/```json|```/g, "").trim();
          try { extracted = JSON.parse(clean); } catch(e) {}
        }
      }

      if (extracted) {
        setResult(extracted);
      } else {
        setError("Could not extract data from this URL. Try a direct property listing page rather than a search results page.");
      }
    } catch(e) {
      setError("Failed to fetch: " + e.message);

    setLoading(false);

    // Add to pipeline
    const newEntry = { ...result, id: Date.now(), importedAt: new Date().toISOString(), url };
    const newPipeline = [newEntry, ...pipeline];
    setPipeline(newPipeline);
    setData(d => ({ ...d, pipeline: newPipeline }));
    setImported(true);
  };

  const addToPipeline = () => {
    if (!result) return;
    const newEntry = { ...result, id: Date.now(), savedAt: new Date().toISOString(), url };
    const newPipeline = [newEntry, ...pipeline];
    setPipeline(newPipeline);
    setData(d => ({ ...d, pipeline: newPipeline }));

  const FMT2 = n => !n||isNaN(n)?"—":n>=1e6?`£${(n/1e6).toFixed(2)}m`:n>=1000?`£${Math.round(n/1000)}k`:`£${Math.round(n).toLocaleString()}`;

  return (
    <div className="stage">
      <div className="sh">
        <h2>Land Opportunity Finder</h2>
        <p>Paste any land agent URL — AI extracts the key data and pre-fills your Landform appraisal fields automatically</p>
      </div>

      {/* QUICK LINKS */}
      <div className="card">
        <div className="ct">Quick Links — Major Land Agents & Portals</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {SOURCES.map(s=>(
            <div key={s.name} onClick={()=>setUrl(s.url)} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:8,padding:"12px 14px",cursor:"pointer",transition:"all .15s"}}

          </div>
          <button className="ai-btn" onClick={scrape} disabled={loading||!url} style={{flexShrink:0,padding:"9px 20px"}}>

      {/* RESULTS */}

          {/* KEY METRICS */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:4}}>

      {/* HOW IT WORKS */}
      {!result&&!loading&&(
        <div className="card">
          <div className="ct">How It Works</div>

    <option value="">Select city...</option>

// ── Dashboard ──
const Dashboard = ({data,setActive}) => {
  const at=data.assetType||"btr"; const l=data.land||{}; const p=data.planning||{}; const f=data.fin||{};
  const city=l.city||"manchester"; const m=MKT[city]||MKT.manchester;
  const units=N(p.units); const gia=N(l.acres)*43560*.65;
  const bcp=N(f.buildPsf)||m.build; const bc=gia*bcp;
  const lc=N(l.price); const s106=N(p.s106);
  const tc=bc+lc+s106+bc*.12+bc*.05+(bc+lc)*.075+lc*.05;
  const ru=at==="pbsa"?N(f.rent)||m.pbsa:N(f.rent)||m.btr;
  const gr=at==="pbsa"?units*ru*52:units*ru*12;
  const noi=gr*.95-.12*gr*.95;
  const ey=N(f.exitYield)/100||m.yield;
  const gdv=noi/ey; const profit=gdv-tc;
  const margin=gdv>0?(profit/gdv)*100:0;
  const sc=margin>=15?"#2D7A65":"#B05A35";
  return (
    <div className="stage">
      <div className="sh"><h2>Deal Dashboard</h2><p>Live overview — fill in the stages to see metrics update</p></div>
      <div className="dash-grid">
        {[{l:"GDV",v:FMT(gdv)},{l:"Total Dev Cost",v:FMT(tc)},{l:"Developer Profit",v:FMT(profit),c:sc},
          {l:"Margin on GDV",v:PCT(margin),c:sc},{l:"NOI (pa)",v:FMT(noi)},{l:"Exit Yield",v:PCT(ey*100)},
          {l:at==="pbsa"?"Total Beds":"Total Units",v:units||"—"},{l:"City",v:city.replace(/_/g," ").replace(/\b\w/g,l=>l.toUpperCase())||"—"}
        ].map(({l:lb,v,c})=>(
          <div key={lb} className="dash-card"><div className="dc-l">{lb}</div><div className="dc-v" style={{color:c||"var(--text)"}}>{v}</div></div>
        ))}
      </div>
      <div className="card">
        <div className="ct">Quick Actions</div>
        <div className="qa-grid">
          {[["🏡","Single Family Housing","sfh"],["🏢","High-Rise Apartments","hra"],["🏠","Property Evaluator","epe"],["◆","Land Valuation","rlv"],["⬟","Land Appraisal","land"],["▲","Planning & Viability","planning"],["◉","Financial Modelling","fin"],["◈","Investment Exit","exit"]].map(([icon,label,id])=>(
            <button key={id} className="qa-btn" onClick={()=>setActive(id)}>{icon} {label}</button>
          ))}
        </div>
      </div>
      <AIPanel label="⚡ Full Deal Summary" prompt="Generate a comprehensive deal summary with investment thesis, strengths, risks and next steps. Rate the deal 1-10." ctx={{at,city,gdv,tc,profit,margin,noi,units}}/>
    </div>
  );
};

const LandAppraisal = ({data,setData}) => {
  const up=(k,v)=>setData(d=>({...d,land:{...d.land,[k]:v}}));
  const l=data.land||{}; const at=data.assetType||"btr";
  const city=l.city||"manchester"; const m=MKT[city]||MKT.manchester;
  const score=(()=>{
    let s=0;
    const vm={proximity:{excellent:25,good:15,fair:8,poor:0},transport:{excellent:20,good:12,fair:6,poor:0},
      contamination:{clean:20,minor:10,major:0,unknown:4},tenure:{freehold:15,long_leasehold:10,short_leasehold:3},
      constraint:{none:20,minor:12,moderate:6,major:0}};
    for(const[k,v] of Object.entries(vm)) s+=v[l[k]]||0;
    return s;
  })();
  const sc=score>=70?"#2D7A65":score>=45?"#9A7B3E":"#B05A35";
  const lv=N(l.price); const mv=m.land||0;
  const diff=mv>0?((lv-mv)/mv*100):null;
  return (
    <div className="stage">
      <div className="sh"><h2>Land Appraisal</h2><p>Site evaluation, location scoring and market benchmarking</p></div>
      <div className="card"><div className="ct">Site Details</div>

          <div className="fg"><label>Asking Price (£)</label><input type="number" value={l.price||""} onChange={e=>up("price",e.target.value)} placeholder="e.g. 4500000"/></div>
          {[{k:"proximity",label:"Proximity to Demand",opts:[["excellent","<10 min walk"],["good","<20 min / 5 min cycle"],["fair","Public transport needed"],["poor","Car dependent"]]},
            {k:"transport",label:"Transport Connectivity",opts:[["excellent","Train+Bus+Cycle"],["good","Bus+Cycle"],["fair","Bus only"],["poor","Limited"]]},

// ── Financial Modelling ──
const FinancialModelling = ({data,setData}) => {
  const up=(k,v)=>setData(d=>({...d,fin:{...d.fin,[k]:v}}));
  const f=data.fin||{}; const l=data.land||{}; const p=data.planning||{};
  const at=data.assetType||"btr"; const city=l.city||"manchester";
  const m=MKT[city]||MKT.manchester;
  const units=N(p.units); const gia=N(l.acres)*43560*.65;
  const bcp=N(f.buildPsf)||m.build;
  const bc=gia*bcp; const lc=N(l.price); const s106=N(p.s106);
  const cont=bc*(N(f.contingency)/100||.05);
  const fees=bc*.12; const fin=(bc+lc)*(N(f.finRate)/100||.075);
  const sdlt=lc*.05;
  const tc=bc+lc+s106+cont+fees+fin+sdlt;
  const ru=at==="pbsa"?N(f.rent)||m.pbsa:N(f.rent)||m.btr;
  const gr=at==="pbsa"?units*ru*52:units*ru*12;
  const voidAdj=at==="pbsa"?.97:.95;
  const opex=units*(at==="pbsa"?600:1050)+gr*voidAdj*.12;
  const noi=gr*voidAdj-opex;
  const ey=N(f.exitYield)/100||m.yield;
  const gdv=noi/ey; const profit=gdv-tc;
  const margin=gdv>0?(profit/gdv)*100:0;
  const roc=tc>0?(profit/tc)*100:0;
  const viable=margin>=15; const sc=viable?"#2D7A65":"#B05A35";
  const scen=[{l:"Bear",sm:-.10,bm:+.15},{l:"Base",sm:0,bm:0},{l:"Bull",sm:+.08,bm:-.05}].map(s=>{
    const sG=(gr*(1+s.sm))*voidAdj-opex; const sGdv=sG/ey;
    const sCost=tc*(1+s.bm); const sProfit=sGdv-sCost;
    return {...s,gdv:sGdv,profit:sProfit,margin:sGdv>0?(sProfit/sGdv)*100:0};
  });
  return (
    <div className="stage">
      <div className="sh"><h2>Financial Modelling</h2><p>Full development appraisal, returns and scenario analysis</p></div>
      <div className="card"><div className="ct">Inputs</div>
        <div className="fg2">
          <div className="fg"><label>Build Cost psf (£) — market: £{m.build}</label><input type="number" value={f.buildPsf||""} onChange={e=>up("buildPsf",e.target.value)} placeholder={`£${m.build}/sqft`}/></div>
          <div className="fg"><label>{at==="pbsa"?"Weekly Rent/Bed":"Monthly Rent/Unit"} (£)</label><input type="number" value={f.rent||""} onChange={e=>up("rent",e.target.value)} placeholder={`Market: £${at==="pbsa"?m.pbsa:m.btr}`}/></div>
          <div className="fg"><label>Exit Yield (%)</label><input type="number" step="0.05" value={f.exitYield||""} onChange={e=>up("exitYield",e.target.value)} placeholder={`Market: ${(m.yield*100).toFixed(2)}%`}/></div>
          <div className="fg"><label>Finance Rate (%)</label><input type="number" step="0.1" value={f.finRate||""} onChange={e=>up("finRate",e.target.value)} placeholder="7.5"/></div>
          <div className="fg"><label>Contingency (%)</label><input type="number" value={f.contingency||""} onChange={e=>up("contingency",e.target.value)} placeholder="5"/></div>
        </div>
      </div>
      {units>0&&gia>0&&<>
        <div className="card"><div className="ct">Development Appraisal</div>
          <div className="ap-cols">
            <div><div className="ap-t">COSTS</div>
              {[["Land",lc],[`Build (${Math.round(gia).toLocaleString()} sqft @ £${bcp}/sqft)`,bc],["S106/CIL",s106],["Contingency",cont],["Prof Fees (12%)",fees],["Finance",fin],["SDLT (5%)",sdlt]].map(([lb,v])=>(
                <div key={lb} className="ap-row"><span>{lb}</span><span>{FMT(v)}</span></div>
              ))}
              <div className="ap-row tot"><span>Total Dev Cost</span><span>{FMT(tc)}</span></div>
            </div>
            <div><div className="ap-t">INCOME & GDV</div>
              {[["Gross Rent (pa)",gr],["Effective Rent",gr*voidAdj],["OpEx (pa)",-opex],["NOI (pa)",noi],[`Exit Yield`,null,PCT(ey*100)]].map(([lb,v,ov])=>(
                <div key={lb} className="ap-row"><span>{lb}</span><span>{ov||FMT(v)}</span></div>
              ))}
              <div className="ap-row tot"><span>GDV</span><span>{FMT(gdv)}</span></div>
            </div>
          </div>
          <div className="ret-grid">
            {[{l:"Profit",v:FMT(profit),ok:viable},{l:"Margin on GDV",v:PCT(margin),ok:viable},{l:"Return on Cost",v:PCT(roc),ok:roc>20},{l:`Price/${at==="pbsa"?"Bed":"Unit"}`,v:units>0?FMT(gdv/units):"—",ok:false}].map(({l:lb,v,ok})=>(
              <div key={lb} className="ret-card" style={{borderColor:ok?"#2D7A65":"var(--border)"}}><div className="ret-l">{lb}</div><div className="ret-v" style={{color:ok?"#2D7A65":"var(--text)"}}>{v}</div></div>
            ))}
          </div>
          <div className={`viab ${viable?"viab-y":"viab-n"}`}>{viable?`✓ Viable — ${margin.toFixed(1)}% margin on GDV`:`✗ Not viable — ${margin.toFixed(1)}% (${(15-margin).toFixed(1)}% below 15% threshold)`}</div>
        </div>
        <div className="card"><div className="ct">Scenario Analysis</div>
          <div className="scen-t">
            <div className="scen-h"><span>Scenario</span><span>GDV</span><span>Profit</span><span>Margin</span></div>
            {scen.map(s=><div key={s.l} className="scen-r"><span style={{fontWeight:700}}>{s.l}</span><span>{FMT(s.gdv)}</span><span style={{color:s.profit>0?"#2D7A65":"#B05A35"}}>{FMT(s.profit)}</span><span style={{color:s.margin>=15?"#2D7A65":"#B05A35"}}>{PCT(s.margin)}</span></div>)}
          </div>
        </div>
      </>}
      <AIPanel label="⚡ Deep Financial Analysis" prompt={`Analyse this ${at.toUpperCase()} appraisal. GDV ${FMT(gdv)}, TDC ${FMT(tc)}, margin ${PCT(margin)}. Provide: 1) Return benchmarking, 2) Key value drivers, 3) Recommended deal structure, 4) Value engineering options, 5) Most critical assumption.`} ctx={{gdv,tc,noi,margin,roc,units,ey,at,city}}/>
    </div>
  );
};

// ── SFH ──
const SFH = ({data,setData}) => {
  const up=(k,v)=>setData(d=>({...d,sfh:{...d.sfh,[k]:v}}));
  const s=data.sfh||{};
  const city=s.city||data.land?.city||"manchester"; const m=MKT[city]||MKT.manchester;
  const acres=N(s.acres); const dph=N(s.dph)||30;
  const ha=acres*.404686; const maxUnits=Math.floor(ha*dph);
  const mix=s.mix||[{type:"3-bed semi",count:"",psf:""},{type:"4-bed detached",count:"",psf:""},{type:"3-bed detached",count:"",psf:""}];
  const updMix=(i,k,v)=>{const m=[...mix];m[i]={...m[i],[k]:v};up("mix",m);};
  const basePsf=N(s.basePsf)||m.btr*8.5||280;
  const buildPsf=N(s.buildPsf)||195;
  const hc=mix.map(row=>{
    const count=N(row.count); if(!count||!row.type) return null;
    const info=HOUSE_TYPES[row.type]||HOUSE_TYPES["3-bed semi"];
    const sp=N(row.psf)||(basePsf*info.adj);
    return {type:row.type,count,sqft:info.sqft,sp,unitGdv:info.sqft*sp,totalGdv:info.sqft*sp*count,build:info.sqft*buildPsf*count};
  }).filter(Boolean);
  const totalUnits=hc.reduce((a,h)=>a+h.count,0);
  const totalGdv=hc.reduce((a,h)=>a+h.totalGdv,0);
  const totalBuild=hc.reduce((a,h)=>a+h.build,0);
  const totalGia=hc.reduce((a,h)=>a+h.sqft*h.count,0);
  const profitPct=N(s.profitPct)||20;
  const fees=totalBuild*.10; const cont=totalBuild*(N(s.contingency)||5)/100;
  const fin=(totalBuild+fees)*(N(s.finRate)||7.5)/100;
  const s106=totalUnits*(N(s.s106pu)||8000);
  const roads=totalUnits*(N(s.roads)||12000);
  const infra=acres*53000;
  const devProfit=totalGdv*(profitPct/100);
  const tc=totalBuild+fees+cont+fin+s106+roads+infra;
  const rlv=totalGdv-tc-devProfit;
  const rlvPu=totalUnits>0?rlv/totalUnits:0;
  const margin=totalGdv>0?(devProfit/totalGdv)*100:0;
  const sc=rlv>0?"#2D7A65":"#B05A35";
  return (
    <div className="stage">
      <div className="sh"><h2>Single Family Housing</h2><p>Plot-by-plot residential appraisal with house type mix, roads adoption and SuDS</p></div>
      <div className="card"><div className="ct">Site Details</div>
        <div className="fg2">
          <div className="fg"><label>City</label><CitySelect val={s.city} onChange={e=>up("city",e.target.value)}/></div>
          <div className="fg"><label>Site Area (acres)</label><input type="number" step="0.1" value={s.acres||""} onChange={e=>up("acres",e.target.value)} placeholder="e.g. 5.0"/></div>
          <div className="fg"><label>Density (dph)</label><input type="number" value={s.dph||""} onChange={e=>up("dph",e.target.value)} placeholder="30"/></div>
          <div className="fg"><label>Base Sale Price psf (£)</label><input type="number" value={s.basePsf||""} onChange={e=>up("basePsf",e.target.value)} placeholder={`£${Math.round(basePsf)}`}/></div>
          <div className="fg"><label>Build Cost psf (£)</label><input type="number" value={s.buildPsf||""} onChange={e=>up("buildPsf",e.target.value)} placeholder="£195"/></div>
          <div className="fg"><label>Developer Profit (% GDV)</label><input type="number" value={s.profitPct||""} onChange={e=>up("profitPct",e.target.value)} placeholder="20"/></div>
          <div className="fg"><label>S106 per Plot (£)</label><input type="number" value={s.s106pu||""} onChange={e=>up("s106pu",e.target.value)} placeholder="8000"/></div>
          <div className="fg"><label>Roads/Sewers per Plot (£)</label><input type="number" value={s.roads||""} onChange={e=>up("roads",e.target.value)} placeholder="12000 (S38/S104)"/></div>
          <div className="fg"><label>Affordable Housing %</label><input type="number" value={s.ahPct||""} onChange={e=>up("ahPct",e.target.value)} placeholder="e.g. 25"/></div>
        </div>
        {acres>0&&<div className="site-sum"><span>{acres} acres / {ha.toFixed(2)} ha</span><span>·</span><span>~{maxUnits} units at {dph} dph</span><span>·</span><span>{dph<25?"Low density":dph<35?"Standard suburban":dph<45?"Medium density":"High density"}</span></div>}
      </div>
      <div className="card"><div className="ct">House Type Mix</div>
        <div className="sfh-t">
          <div className="sfh-h"><span>Type</span><span>Plots</span><span>sqft</span><span>£/sqft</span><span>Unit GDV</span><span>Total</span></div>
          {mix.map((row,i)=>{
            const info=HOUSE_TYPES[row.type]||HOUSE_TYPES["3-bed semi"];
            const sp=N(row.psf)||(basePsf*info.adj); const cnt=N(row.count);
            return (<div key={i} className="sfh-r">
              <span><select value={row.type} onChange={e=>updMix(i,"type",e.target.value)} style={{fontSize:11,padding:"5px 6px",width:"100%"}}>{Object.keys(HOUSE_TYPES).map(t=><option key={t} value={t}>{t}</option>)}</select></span>
              <span><input type="number" value={row.count||""} onChange={e=>updMix(i,"count",e.target.value)} placeholder="0" style={{width:60,padding:"5px 6px",fontSize:12}}/></span>

              <span style={{fontSize:12,fontWeight:600}}>{cnt>0?FMT(info.sqft*sp):"—"}</span>

            </div>);
          })}
          {totalUnits>0&&<div className="sfh-tot"><span>TOTAL</span><span>{totalUnits}</span><span>{totalGia.toLocaleString()} sqft</span><span></span><span></span><span style={{color:"var(--cb)",fontWeight:800}}>{FMT(totalGdv)}</span></div>}

          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:sc,marginBottom:6}}>Residual Land Value</div>
          <div style={{fontSize:32,fontWeight:800,color:sc,lineHeight:1,marginBottom:8}}>{FMT(rlv)}</div>
          <div style={{display:"flex",gap:20,fontSize:12,color:"var(--td)",flexWrap:"wrap"}}>

            <span>Margin: {PCT(margin)}</span><span style={{color:sc,fontWeight:700}}>{rlv>0&&margin>=15?"✓ Viable":"✗ Below threshold"}</span>

      <AIPanel label="⚡ SFH Analysis" prompt={`Analyse this SFH development. ${acres} acres in ${city}, ${dph} dph, ${totalUnits} plots. Mix: ${hc.map(h=>`${h.count}x ${h.type}`).join(", ")}. GDV: ${FMT(totalGdv)}, RLV: ${FMT(rlv)} (${FMT(rlvPu)}/plot). AH: ${s.ahPct||0}%. Provide: 1) Mix assessment, 2) Price sense check, 3) AH strategy, 4) Infrastructure costs adequacy, 5) Phasing strategy, 6) Key risks.`} ctx={{city,acres,dph,totalUnits,totalGdv,rlv,rlvPu,margin}}/>

// ── High-Rise ──
const HighRise = ({data,setData}) => {
  const up=(k,v)=>setData(d=>({...d,hra:{...d.hra,[k]:v}}));
  const h=data.hra||{};
  const city=h.city||data.land?.city||"manchester"; const m=MKT[city]||MKT.manchester;
  const storeys=N(h.storeys); const fp=N(h.fp); const eff=N(h.eff)||80;
  const gia=fp*storeys; const nia=gia*(eff/100);
  const ss=N(h.ss)||20; const os=N(h.os)||50; const ts=N(h.ts)||30;
  const ssqft=N(h.ssqft)||380; const osqft=N(h.osqft)||520; const tsqft=N(h.tsqft)||750;
  const su=nia>0?Math.round(nia*(ss/100)/ssqft):0;
  const ou=nia>0?Math.round(nia*(os/100)/osqft):0;
  const tu=nia>0?Math.round(nia*(ts/100)/tsqft):0;
  const total=su+ou+tu;
  const sPsf=N(h.sPsf)||(m.btr*7.8)||260;
  const oPsf=N(h.oPsf)||(m.btr*8.2)||280;
  const tPsf=N(h.tPsf)||(m.btr*8.8)||300;
  const fl=N(h.fl)||.5; const blend=1+(storeys>1?(storeys/2)*fl/100:0);
  const sGdv=su*ssqft*sPsf*blend; const oGdv=ou*osqft*oPsf*blend; const tGdv=tu*tsqft*tPsf*blend;
  const gdv=sGdv+oGdv+tGdv; const avgPsf=nia>0?gdv/nia:0;
  const bcp=N(h.bcp)||(storeys>=20?310:storeys>=15?280:storeys>=10?255:230);
  const bc=gia*bcp;

const LandValuation = ({data,setData}) => {
  const up=(k,v)=>setData(d=>({...d,rlv:{...d.rlv,[k]:v}}));

  const [lrRes,setLrRes]=useState(null); const [lrLoad,setLrLoad]=useState(false); const [lrErr,setLrErr]=useState(null);
  const pcLookup = r.postcode ? lookupPostcode(r.postcode) : null;
  const city = pcLookup?.city || r.city || "manchester";
  const m=MKT[city]||MKT.manchester;
  const salePsf=N(r.salePsf)||pcLookup?.salePsf||m.btr*8.5||280;
  const schType=r.schType||"Residential houses";
  const bc=BUILD[schType]||BUILD["Residential houses"];
  const units=N(r.units); const avgSqft=N(r.avgSqft)||850;
  const buildPsf=N(r.buildPsf)||bc.mid;
  const profit=N(r.profitPct)||20; const finRate=N(r.finRate)||7.5;
  const cont=N(r.contingency)||5; const s106Pu=N(r.s106pu)||8000;
  const acres=N(r.acres);
  const totalGia=units*avgSqft;
  const gdv=totalGia*salePsf;
  const buildCost=totalGia*buildPsf;
  const fees=buildCost*bc.fees; const contCost=buildCost*cont/100;
  const finCost=(buildCost+fees)*(finRate/100);
  const planCost=units*bc.plan; const s106=units*s106Pu;
  const devProfit=gdv*(profit/100);
  const tc=buildCost+fees+contCost+finCost+planCost+s106;
  const rlv=gdv-tc-devProfit;
  const rlvPu=units>0?rlv/units:0; const rlvAcre=acres>0?rlv/acres:0;
  const rlvPctGdv=gdv>0?(rlv/gdv)*100:0;
  const sc=rlv>0?"#2D7A65":"#B05A35";

  const fetchLR = async () => {
    if (!r.postcode) return;
    setLrLoad(true); setLrErr(null); setLrRes(null);
    const pc = r.postcode.toUpperCase().replace(/\s/g,"");
    const match = pc.match(/^([A-Z]{1,2}\d{1,2}[A-Z]?)\s*(\d)/);
    if (!match) { setLrErr("Invalid postcode format"); setLrLoad(false); return; }
    const sector = `${match[1]} ${match[2]}`;
    const sparql = `PREFIX lrppi: <http://landregistry.data.gov.uk/def/ppi/>
PREFIX lrcommon: <http://landregistry.data.gov.uk/def/common/>
PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
SELECT ?paon ?street ?postcode ?amount ?date ?type WHERE {
  ?addr lrcommon:postcode "${sector}"^^xsd:string .
  ?t lrppi:propertyAddress ?addr ; lrppi:pricePaid ?amount ; lrppi:transactionDate ?date ; lrppi:propertyType ?typeUri .
  OPTIONAL { ?addr lrcommon:paon ?paon } OPTIONAL { ?addr lrcommon:street ?street } OPTIONAL { ?addr lrcommon:postcode ?postcode }
  BIND(STRAFTER(STR(?typeUri),"type/") AS ?type)
} ORDER BY DESC(?date) LIMIT 30`;
    try {
      const res = await fetch(`https://landregistry.data.gov.uk/landregistry/query?query=${encodeURIComponent(sparql)}&output=json`,{headers:{"Accept":"application/json"}});
      const json = await res.json();
      const rows = (json?.results?.bindings||[]).map(b=>({
        addr:[b.paon?.value,b.street?.value].filter(Boolean).join(" "),
        pc:b.postcode?.value||pc, amount:parseInt(b.amount?.value||0),
        date:b.date?.value?.substring(0,10)||"", type:b.type?.value?.charAt(0)||"T"
      })).filter(r=>r.amount>10000);
      if(!rows.length){setLrErr(`No transactions found for ${sector}. Enter price manually.`);setLrLoad(false);return;}
      const TYPE_SQF={D:1350,S:980,T:820,F:620,O:900};
      const byType={};
      rows.forEach(r=>{const tc=r.type.charAt(0).toUpperCase();if(!byType[tc])byType[tc]=[];byType[tc].push(r.amount);});
      const typeStats=Object.entries(byType).map(([code,prices])=>{
        const avg=prices.reduce((a,b)=>a+b,0)/prices.length;
        const sqf=TYPE_SQF[code]||900;
        return{code,label:{D:"Detached",S:"Semi-detached",T:"Terraced",F:"Flat",O:"Other"}[code]||"Other",avg:Math.round(avg),psf:Math.round(avg/sqf),count:prices.length};
      }).sort((a,b)=>b.count-a.count);
      const totalTx=rows.length;
      const wPsf=Math.round(typeStats.reduce((a,t)=>a+t.psf*t.count,0)/totalTx);
      setLrRes({sector,rows:rows.slice(0,10),typeStats,wPsf,totalTx});
      if(wPsf>0&&!r.salePsf) up("salePsf",wPsf);
    } catch(err) { setLrErr("Could not reach Land Registry. Enter price manually below."); }
    setLrLoad(false);
  };

  return (
    <div className="stage">

        {pcLookup&&<div className="site-sum"><span>City identified: <strong>{city.replace(/_/g," ").replace(/\b\w/g,l=>l.toUpperCase())}</strong></span>{pcLookup.salePsf&&<><span>·</span><span>Local benchmark: <strong>£{pcLookup.salePsf}/sqft</strong></span></>}</div>}
        {lrErr&&<div style={{background:"#FFF0EC",border:"1px solid #E8C4B0",borderRadius:6,padding:"10px 14px",fontSize:12,color:"#8A3A1A",marginTop:8}}>{lrErr}</div>}
        {lrRes&&<>
          <div style={{textAlign:"center",padding:"18px",background:"linear-gradient(135deg,#EEEEF8,#E4E4F4)",borderRadius:10,margin:"12px 0"}}>
            <div style={{fontSize:48,fontWeight:800,color:"var(--cb)",lineHeight:1}}>£{lrRes.wPsf.toLocaleString()}<span style={{fontSize:20,color:"var(--td)"}}>/sqft</span></div>
            <div style={{fontSize:13,fontWeight:600,color:"var(--cd)",marginTop:6}}>Weighted average — {lrRes.totalTx} Land Registry transactions</div>
            <div style={{fontSize:11,color:"var(--td)",marginTop:4}}>Sector: {lrRes.sector} · £/sqft inferred from BCIS property type benchmarks</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:12}}>
            {lrRes.typeStats.map(t=>(
              <div key={t.code} style={{background:"#fff",border:"1px solid var(--border)",borderTop:"3px solid var(--cb)",borderRadius:8,padding:12}}>
                <div style={{fontSize:10,fontWeight:700,color:"var(--td)",textTransform:"uppercase",marginBottom:6}}>{t.label}</div>
                <div style={{fontSize:20,fontWeight:700,color:"var(--cd)"}}>{FMT(t.avg)}</div>
                <div style={{fontSize:11,fontWeight:600,color:"var(--cb)"}}>£{t.psf}/sqft</div>
                <div style={{fontSize:10,color:"var(--td)"}}>{t.count} sales</div>
              </div>
            ))}
          </div>
          <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"8px 12px",background:"var(--surface3)",fontSize:9,color:"var(--td)",textTransform:"uppercase",letterSpacing:".1em",fontWeight:700,borderBottom:"1px solid var(--border)"}}>
              <span>Address</span><span>Postcode</span><span>Date</span><span>Price</span>
            </div>
            {lrRes.rows.map((t,i)=>(

                <span style={{color:"var(--text)",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.addr||"—"}</span>
                <span style={{color:"var(--cb)",fontWeight:700}}>{t.pc}</span>
                <span>{t.date}</span>
                <span style={{fontWeight:600,color:"var(--text)"}}>{FMT(t.amount)}</span>
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:"var(--td)",fontStyle:"italic",padding:"8px 4px"}}>Source: HM Land Registry Price Paid Data (Open Government Licence)</div>
        </>}
      </div>
      <div className="card"><div className="ct">Residual Land Valuation</div>
        <div className="fg2">
          <div className="fg"><label>Scheme Type</label>
            <select value={r.schType||""} onChange={e=>up("schType",e.target.value)}>

            </select>
          </div>

          <div className="fg"><label>Build Cost psf — BCIS: £{bc.lo}–£{bc.hi}</label><input type="number" value={r.buildPsf||""} onChange={e=>up("buildPsf",e.target.value)} placeholder={`Mid: £${bc.mid}/sqft`}/></div>
          <div className="fg"><label>Dev Profit % GDV</label><input type="number" value={r.profitPct||""} onChange={e=>up("profitPct",e.target.value)} placeholder="20"/></div>
          <div className="fg"><label>Finance Rate %</label><input type="number" step="0.1" value={r.finRate||""} onChange={e=>up("finRate",e.target.value)} placeholder="7.5"/></div>
          <div className="fg"><label>S106/CIL per Unit (£)</label><input type="number" value={r.s106pu||""} onChange={e=>up("s106pu",e.target.value)} placeholder="8000"/></div>
          <div className="fg"><label>Site Area (acres)</label><input type="number" step="0.1" value={r.acres||""} onChange={e=>up("acres",e.target.value)} placeholder="e.g. 0.5"/></div>
        </div>
        {units>0&&gdv>0&&<>
          <div className="ap-cols">
            <div><div className="ap-t">GDV</div>
              <div className="ap-row"><span>{units} units × {avgSqft} sqft × £{Math.round(salePsf)}/sqft</span><span>{FMT(gdv)}</span></div>

// ── Due Diligence ──
const DueDiligence = ({data,setData}) => {
  const up=(k,v)=>setData(d=>({...d,dd:{...d.dd,[k]:v}}));
  const dd=data.dd||{}; const checked=dd.checked||{};
  const toggle=(cat,item)=>{const cur=checked[cat]||[];const next=cur.includes(item)?cur.filter(x=>x!==item):[...cur,item];up("checked",{...checked,[cat]:next});};
  const total=Object.values(DD_ITEMS).flat().length;
  const done=Object.values(checked).flat().length;
  const pct=Math.round((done/total)*100);
  const catC={Legal:"#8B9DC3",Technical:"#7FB3A0",Planning:"#9A7B3E",Commercial:"#B05A35"};
  return (
    <div className="stage">
      <div className="sh"><h2>Due Diligence</h2><p>Structured checklist across legal, technical, planning and commercial</p></div>
      <div className="card">
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{fontFamily:"DM Sans,sans-serif",fontSize:48,fontWeight:800,color:pct>=80?"#2D7A65":pct>=50?"#9A7B3E":"#B05A35",lineHeight:1,minWidth:80}}>{pct}%</div>
          <div style={{flex:1}}><div style={{height:8,background:"var(--border)",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:pct>=80?"#2D7A65":pct>=50?"#9A7B3E":"#B05A35",borderRadius:4,transition:"width .4s"}}/></div><div style={{fontSize:12,color:"var(--td)",marginTop:6}}>{done} of {total} items confirmed</div></div>
        </div>
      </div>
      {Object.entries(DD_ITEMS).map(([cat,items])=>{
        const catDone=checked[cat]||[];
        return (<div key={cat} className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}} className="ct"><span>{cat} Due Diligence</span><span style={{color:catC[cat],fontSize:12}}>{catDone.length}/{items.length}</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {items.map(item=>(
              <label key={item} onClick={()=>toggle(cat,item)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:6,cursor:"pointer",border:`1px solid ${catDone.includes(item)?catC[cat]:"transparent"}`,background:catDone.includes(item)?"var(--surface3)":"transparent",fontSize:12,color:catDone.includes(item)?"var(--text)":"var(--td)",transition:"all .12s"}}>
                <div style={{width:16,height:16,borderRadius:3,border:`1px solid ${catDone.includes(item)?catC[cat]:"var(--border)"}`,background:catDone.includes(item)?catC[cat]:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:10,color:"#fff"}}>{catDone.includes(item)&&"✓"}</div>
                {item}
              </label>
            ))}
          </div>
        </div>);
      })}
      <AIPanel label="⚡ DD Gap Analysis" prompt={`DD gap analysis. ${done}/${total} complete. Missing: ${Object.entries(DD_ITEMS).flatMap(([cat,items])=>items.filter(i=>!(checked[cat]||[]).includes(i)).map(i=>`${cat}: ${i}`)).join(", ")||"None"}. Provide: 1) Critical pre-exchange items, 2) Items to defer with protections, 3) Missing items, 4) Timeline to clear.`} ctx={{done,total,pct,checked}}/>
    </div>
  );
};

// ── Risk Register ──

    </div>
  );
};
