async function callAI(user, stage, prompt, ctx) {

    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      action: "ai",
      model: "claude-sonnet-4-20250514",
      max_tokens: 900,
      system: "You are a senior UK real estate development advisor. Be specific, commercially sharp, use UK conventions. Plain text only.",
      messages: [{role: "user", content: prompt + "\n\nData: " + JSON.stringify(ctx)}],
      user: (user && user.name) || "",
      stage: stage
    })
  });
  var data = await res.json();
  if (data.status === "ok" && data.content) {
    var block = null;
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === "text") { block = data.content[i]; break; }
    }
    return block ? block.text : "No response";
  }
  return "Analysis failed";
}
