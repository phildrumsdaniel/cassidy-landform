function num(v){return parseFloat(v)||0;}
function fmt(n){
  if(!n||isNaN(n))return"—";
  var a=Math.abs(n);
  if(a>=1000000)return"£"+(n/1000000).toFixed(2)+"m";
  if(a>=1000)return"£"+Math.round(n/1000)+"k";
  return"£"+Math.round(n).toLocaleString();
}
function pct(n){return n?n.toFixed(1)+"%":"—";}
function cityName(c){return c?c.charAt(0).toUpperCase()+c.replace(/_/g," ").slice(1):"—";}

function lookupPostcode(pc){
  var clean=(pc||"").toUpperCase().replace(/\s/g,"");
  for(var len=4;len>=2;len--){
    var key=clean.substring(0,len);
    if(PC_CITY[key])return{city:PC_CITY[key],salePsf:PC_PSF[key]||null};
  }
  return null;
}

function logEvent(user,event,details){
  try{
    var params=new URLSearchParams({
      action:"log",timestamp:new Date().toISOString(),
      user:(user&&user.name)||"Unknown",company:(user&&user.company)||"Unknown",
      role:(user&&user.role)||"demo",event:event,
      details:typeof details==="object"?JSON.stringify(details).substring(0,300):String(details).substring(0,300),
      userAgent:navigator.userAgent.substring(0,80)
    });
    fetch(WEBHOOK+"?"+params.toString()).catch(function(){});
  }catch(e){}
}

async function callAI(user,stage,systemPrompt,userPrompt){
  logEvent(user,"AI_ANALYSIS",{stage:stage});
  var res=await fetch(WEBHOOK,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      action:"ai",model:"claude-sonnet-4-20250514",max_tokens:900,
      system:systemPrompt||"You are a senior UK real estate development advisor. Be specific, commercially sharp, use UK conventions. Plain text only.",
      messages:[{role:"user",content:userPrompt}],
      user:(user&&user.name)||"",stage:stage
    })
  });
  var data=await res.json();
  if(data.status==="ok"&&data.content){
    for(var i=0;i<data.content.length;i++){
      if(data.content[i].type==="text")return data.content[i].text;
    }
  }
  return"Analysis failed — please try again";
}

function Tool(props){

  var dt=useState({assetType:"btr",risks:RISK_DEFAULTS.map(function(r){return Object.assign({},r);})}); var data=dt[0]; var setData=dt[1];

  function up(section,key,val){
    setData(function(d){
      var sec=Object.assign({},d[section]||{});

      return next;

  var city=(data.land&&data.land.city)||"manchester";

  var buildPsf=num((data.fin&&data.fin.buildPsf)||m.build);

  var lc=num((data.land&&data.land.price)||0);
  var rent=num((data.fin&&data.fin.rent)||m[at==="pbsa"?"pbsa":"btr"]);
  var gr=at==="pbsa"?units*rent*52:units*rent*12;
  var noi=gr*0.95-gr*0.95*0.12;
  var ey=num((data.fin&&data.fin.exitYield)||m.yield*100)/100||m.yield;
  var gdv=ey>0?noi/ey:0;
  var tc=bc+lc+(data.planning&&data.planning.s106?num(data.planning.s106):0)+bc*0.12+bc*0.05+(bc+lc)*0.075;
  var profit=gdv-tc;
  var margin=gdv>0?(profit/gdv)*100:0;

    var devRlv=newGdv-tc2-devProfit;

  function renderSFH(){

    var basePsf=num(s.basePsf)||(sm.btr*8.5)||280;
    var sBuild=num(s.buildPsf)||195;
    var sProfit=num(s.profitPct)||20;
    var sFin=num(s.finRate)||7.5;
    var sCont=num(s.contingency)||5;
    var s106Pu=num(s.s106pu)||8000;
    var roads=num(s.roads)||12000;
    var mix=s.mix||[
      {type:"3-bed semi",count:"",psf:""},
      {type:"4-bed detached",count:"",psf:""},
      {type:"3-bed detached",count:"",psf:""},
      {type:"2-bed semi",count:"",psf:""},
    ];
    function updMix(i,k,v){var m=mix.slice();m[i]=Object.assign({},m[i]);m[i][k]=v;up("sfh","mix",m);}

    var houseCalcs=mix.map(function(row){
      var cnt=num(row.count); if(!cnt||!row.type)return null;
      var info=HOUSE_TYPES[row.type]||HOUSE_TYPES["3-bed semi"];
      var sp=num(row.psf)||(basePsf*info.adj);
      return{type:row.type,count:cnt,sqft:info.sqft,sp:sp,totalGdv:info.sqft*sp*cnt,build:info.sqft*sBuild*cnt};
    }).filter(Boolean);

    var totalUnits=houseCalcs.reduce(function(a,h){return a+h.count;},0);
    var totalGdv=houseCalcs.reduce(function(a,h){return a+h.totalGdv;},0);
    var totalBuild=houseCalcs.reduce(function(a,h){return a+h.build;},0);
    var fees=totalBuild*0.10; var contCost=totalBuild*(sCont/100);

    var s106Total=totalUnits*s106Pu; var roadsTotal=totalUnits*roads;

    var devProfit=totalGdv*(sProfit/100);
    var tc3=totalBuild+fees+contCost+finCost+s106Total+roadsTotal+infra;
    var rlv=totalGdv-tc3-devProfit;
    var rlvPu=totalUnits>0?rlv/totalUnits:0;
    var rlvAcre=sAcres>0?rlv/sAcres:0;
    var sMargin=totalGdv>0?(devProfit/totalGdv)*100:0;

          e(Inp,{label:"Build Cost psf (£)",type:"number",value:s.buildPsf,onChange:function(v){up("sfh","buildPsf",v);},placeholder:"£195"}),
          e(Inp,{label:"Developer Profit %",type:"number",value:s.profitPct,onChange:function(v){up("sfh","profitPct",v);},placeholder:"20"}),

          e(Inp,{label:"Finance Rate %",type:"number",value:s.finRate,onChange:function(v){up("sfh","finRate",v);},placeholder:"7.5"}),
          e(Inp,{label:"Contingency %",type:"number",value:s.contingency,onChange:function(v){up("sfh","contingency",v);},placeholder:"5"}),
          sAcres>0?e("div",{style:{background:"#EEEEF8",borderRadius:8,padding:12,fontSize:12,color:"#3A3D6A",gridColumn:"span 1"}},
            sAcres+" acres / "+sHa.toFixed(2)+" ha · ~"+sMaxUnits+" units at "+sDph+" dph"

    };
    var checked=data.ddChecked||{};

    var done=Object.keys(checked).filter(function(k){return checked[k];}).length;
    var catC={Legal:"#8B9DC3",Technical:"#7FB3A0",Planning:"#9A7B3E",Commercial:"#B05A35"};

    }
    function addRisk(){
