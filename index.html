}

function lookupLandPsf(pc) {
  var clean=(pc||"").toUpperCase().replace(/\s/g,"");
  for(var len=4;len>=2;len--){
    var key=clean.substring(0,len);
    if(LAND_PSF[key])return LAND_PSF[key];
  }
  return LAND_PSF.DEFAULT;
}

function lookupPostcode(pc){
  var clean=(pc||"").toUpperCase().replace(/\s/g,"");
  for(var len=4;len>=2;len--){
    var key=clean.substring(0,len);
    if(PC_CITY[key])return{city:PC_CITY[key],salePsf:PC_PSF[key]||null};
  }
  return null;
}

function logEvent(user,event,details){
  try{

    var params=new URLSearchParams({
      action:"log",
      timestamp:new Date().toISOString(),
      user:(user&&user.name)||"Unknown",
      company:(user&&user.company)||"Unknown",
      role:(user&&user.role)||"demo",
      event:event,
      details:detailStr,
      userAgent:navigator.userAgent.substring(0,80),
      url:window.location.href,
      sessionId:window._sessionId||"unknown"
    });
    fetch(WEBHOOK+"?"+params.toString()).catch(function(){});
  }catch(e){}
}

async function callAI(user,stage,systemPrompt,userPrompt){
  logEvent(user,"AI_ANALYSIS",{
    stage:stage,
    journey:(typeof journey!=="undefined"?journey:"unknown"),
    promptLength:userPrompt?userPrompt.length:0,
    time:new Date().toLocaleTimeString("en-GB")
  });
  // Use GET to avoid CORS preflight blocks from GitHub Pages
  var aiParams=new URLSearchParams({
    action:"ai",stage:stage,
    user:(user&&user.name)||"",company:(user&&user.company)||"",
    system:(systemPrompt||"You are a senior UK real estate development advisor. Be specific, commercially sharp, use UK conventions. Plain text only.").substring(0,500),
    prompt:userPrompt.substring(0,2000)
  });
  var res=await fetch(WEBHOOK+"?"+aiParams.toString());
  var data=await res.json();
  if(data.status==="ok"&&data.result){
    return data.result;
  }
  return"Analysis failed — please try again";
}

  var user=props.user;

  var hotLS=useState(false); var hotL=hotLS[0]; var setHotL=hotLS[1];
  var memoS=useState(""); var memo=memoS[0]; var setMemo=memoS[1];
  var memoLS=useState(false); var memoL=memoLS[0]; var setMemoL=memoLS[1];

  var journeyS=useState("all"); var journey=journeyS[0]; var setJourney=journeyS[1];

  function up(section,key,val){
    setData(function(d){
      var sec=Object.assign({},d[section]||{});

      var next=Object.assign({},d);
      next[section]=sec;
      return next;
    });
  }

  var city=(data.land&&data.land.city)||(data.hra&&data.hra.city)||(data.sfh&&data.sfh.city)||"";
  var m=(city&&MKT[city])||MKT.manchester;
  var at=data.assetType||"btr";
  var units=num((data.planning&&data.planning.units)||0);

  var gia=acres*43560*0.65;

  var bc=gia*buildPsf;
  var lc=num((data.land&&data.land.price)||0);
  var rent=num((data.fin&&data.fin.rent)||m[at==="pbsa"?"pbsa":"btr"]);
  var gr=at==="pbsa"?units*rent*52:units*rent*12;
  var noi=gr*0.95-gr*0.95*0.12;
  var ey=data.fin&&data.fin.exitYield?num(data.fin.exitYield)/100:0;
  var gdv=ey>0?noi/ey:0;
  var tc=bc+lc+(data.planning&&data.planning.s106?num(data.planning.s106):0)+bc*0.12+bc*0.05+(bc+lc)*0.075;
  var profit=gdv-tc;
  var margin=gdv>0?(profit/gdv)*100:0;
  var scM=margin>=15?"#2D7A65":"#B05A35";

  var idx=STAGES.findIndex(function(s){return s.id===stage;});
  var curStage=STAGES[idx]||STAGES[0];

    }
    window._pageStart=Date.now();
    window._currentStage=id;

    setStage(id);

      private:{label:"Private Landowner",base:1.0,typical:1.8,max:3.0,
        note:"Private owners often have unrealistic price expectations based on Rightmove. Residual valuation is your anchor.",
        tactics:"Use comparable Land Registry data to justify your offer. Option or conditional exchange gives them comfort while protecting you."},
      commercial:{label:"Commercial / Company",base:1.0,typical:1.3,max:2.0,
        note:"Companies need board approval and have fiduciary duties. Often more rational on price but slower to decide.",

      estate:{label:"Estate / Landed Gentry",base:1.0,typical:2.0,max:3.5,
        note:"Estates often have complex title, multiple beneficiaries and emotional attachment to land. Price is not always the primary driver.",
        tactics:"Consider overage clauses, community benefit funds, naming rights. Build relationship before making offer."},
      council:{label:"Local Authority",base:1.0,typical:1.1,max:1.5,
        note:"Councils must achieve best consideration under s123 LGA 1972. Usually closer to market value but slow process.",
        tactics:"Best and final offer process common. Viability evidence helps. Community benefit matters to elected members."},
      church:{label:"Church / Charity",base:1.0,typical:1.2,max:1.8,

    var plotAcres=plotSqft/43560;
    var plotHa=plotAcres*0.404686;
    var currentVal=num(data.epeCurrentVal||0);
    var demolishCost=num(ep.demolishCost||0);

    // Auto-calculate demolish cost from property type and size
    var autoDemolish=(function(){
      var baseCost=num(ep.propSqft)||1000;
      var rates={
        "Pub (traditional)":18,"Pub (large / roadside)":22,
        "Office (small)":14,"Office (large)":16,
        "Church / Chapel":25,"Warehouse / Industrial":8,
        "Detached house":12,"Semi-detached house":10,
        "Terraced house":9,"End of terrace house":10,
        "Hotel / Guest house":20,"School / Former school":18,
        "Care home":16,"Barn":8,"Agricultural building":6,
      };
      var rate=rates[propType]||12;
      return Math.round(baseCost*rate);
    })();

    var demCost=demolishCost||autoDemolish;

    // Development scenarios
    var scenarios=[
      {
        id:"sfh_terraced",label:"Terraced Houses",icon:"🏘",

  // ── LAND VALUATION ─────────────────────────────────────────────────────────
  function renderRLV(){
    var r=data.rlv||{};
    var pcData=r.postcode?lookupPostcode(r.postcode):null;
    var rCity=(pcData&&pcData.city)||"manchester";
    var rm=MKT[rCity]||MKT.manchester;
    var bt=BUILD_TYPES[r.schType]||BUILD_TYPES["Residential houses"];
    var rUnits=num(r.units); var rSqft=num(r.avgSqft)||850;
    var rSalePsf=num(r.salePsf)||(pcData&&pcData.salePsf)||(rm.btr*8.5)||280;
    var rBuild=num(r.buildPsf)||bt.mid;
    var rProfit=num(r.profitPct)||20; var rFin=num(r.finRate)||7.5;
    var rCont=num(r.contingency)||5;
    var rGdv=rUnits*rSqft*rSalePsf;
    var rBc=rUnits*rSqft*rBuild;
    var rFees=rBc*bt.fees; var rContCost=rBc*(rCont/100);
    var rFinCost=(rBc+rFees)*(rFin/100);
    var rS106=rUnits*(num(r.s106pu)||8000);
    var rPlan=rUnits*bt.plan;
    var rDevProfit=rGdv*(rProfit/100);
    var rRlv=rGdv-rBc-rFees-rContCost-rFinCost-rS106-rPlan-rDevProfit;
    var rlvPu=rUnits>0?rRlv/rUnits:0;
    var rlvPctGdv=rGdv>0?(rRlv/rGdv)*100:0;
    var sc=rRlv>0?"#2D7A65":"#B05A35";

    var lrData=r.lrData||null;
    var lrLoading=r.lrLoading||false;
    var lrError=r.lrError||"";

    function fetchLR(){
      var pc=(r.postcode||"").toUpperCase().replace(/\s+/g,"");
      if(!pc)return;
      // Extract area, district, sector from postcode
      var match=pc.match(/^([A-Z]{1,2})(\d{1,2}[A-Z]?)(\d)([A-Z]{2})$/);
      if(!match){up("rlv","lrError","Please enter a full postcode (e.g. CV6 2DL)");return;}
      var area=match[1]; var district=match[1]+match[2]; var sector=district+" "+match[3];
      var fullPc=district+" "+match[3]+match[4];
      up("rlv","lrLoading",true);up("rlv","lrError","");up("rlv","lrData",null);
      up("rlv","lrSectorUsed",sector);

      // Try the full postcode first for best results
      var sparql="PREFIX lrppi: <http://landregistry.data.gov.uk/def/ppi/> "+
        "PREFIX lrcommon: <http://landregistry.data.gov.uk/def/common/> "+
        "PREFIX xsd: <http://www.w3.org/2001/XMLSchema#> "+
        "SELECT ?paon ?street ?town ?postcode ?amount ?date ?typeUri WHERE { "+
        "?addr lrcommon:postcode ?postcode . "+
        "FILTER(STRSTARTS(?postcode, \""+district+"\")) "+
        "?t lrppi:propertyAddress ?addr ; lrppi:pricePaid ?amount ; lrppi:transactionDate ?date ; lrppi:propertyType ?typeUri . "+
        "OPTIONAL{?addr lrcommon:paon ?paon} OPTIONAL{?addr lrcommon:street ?street} OPTIONAL{?addr lrcommon:town ?town} "+
        "FILTER(?date >= \"2022-01-01\"^^xsd:date) "+
        "} ORDER BY DESC(?date) LIMIT 50";

      // Add 30s timeout - LR SPARQL can be very slow
      var lrTimeout=setTimeout(function(){
        up("rlv","lrLoading",false);
        up("rlv","lrError","Land Registry query timed out (>30s). Enter the sale price manually below using Rightmove/Zoopla sold prices for the area.");
      },30000);
      fetch("https://landregistry.data.gov.uk/landregistry/query?query="+encodeURIComponent(sparql)+"&output=json",
        {headers:{"Accept":"application/json"}})
      .then(function(res){return res.json();})
      .then(function(json){
        clearTimeout(lrTimeout);
        var rows=(json&&json.results&&json.results.bindings)||[];

        // If still no results, try broader district
        if(rows.length===0){
          var sparql2="PREFIX lrppi: <http://landregistry.data.gov.uk/def/ppi/> "+
            "PREFIX lrcommon: <http://landregistry.data.gov.uk/def/common/> "+
            "PREFIX xsd: <http://www.w3.org/2001/XMLSchema#> "+
            "SELECT ?paon ?street ?town ?postcode ?amount ?date ?typeUri WHERE { "+
            "?addr lrcommon:postcode ?postcode . "+
            "FILTER(STRSTARTS(STR(?postcode), \""+district+"\")) "+
            "?t lrppi:propertyAddress ?addr ; lrppi:pricePaid ?amount ; lrppi:transactionDate ?date ; lrppi:propertyType ?typeUri . "+
            "OPTIONAL{?addr lrcommon:paon ?paon} OPTIONAL{?addr lrcommon:street ?street} OPTIONAL{?addr lrcommon:town ?town} "+
            "FILTER(?date >= \"2021-01-01\"^^xsd:date) "+
            "} ORDER BY DESC(?date) LIMIT 50";
          return fetch("https://landregistry.data.gov.uk/landregistry/query?query="+encodeURIComponent(sparql2)+"&output=json",
            {headers:{"Accept":"application/json"}}).then(function(r2){return r2.json();})
          .then(function(j2){
            up("rlv","lrSectorUsed",district+" (district)");
            return (j2&&j2.results&&j2.results.bindings)||[];
          });
        }
        return rows;
      })

    var ssqft=num(h.ssqft)||380; var osqft=num(h.osqft)||520; var tsqft=num(h.tsqft)||750;
    var su=nia>0?Math.round(nia*(ss/100)/ssqft):0;
    var ou=nia>0?Math.round(nia*(os/100)/osqft):0;
    var tu=nia>0?Math.round(nia*(ts/100)/tsqft):0;
    var total=su+ou+tu;
    var sPsf=num(h.sPsf)||(hm.btr*7.8)||260;
    var oPsf=num(h.oPsf)||(hm.btr*8.2)||280;
    var tPsf=num(h.tPsf)||(hm.btr*8.8)||300;
    var fl=num(h.fl)||0.5;
    var blend=1+(storeys>1?(storeys/2)*fl/100:0);
    var sGdv=su*ssqft*sPsf*blend; var oGdv=ou*osqft*oPsf*blend; var tGdv=tu*tsqft*tPsf*blend;
    var hGdv=sGdv+oGdv+tGdv; var avgPsf=nia>0?hGdv/nia:0;
    var bcp=num(h.bcp)||(storeys>=20?310:storeys>=15?280:storeys>=10?255:230);
    var hBc=gia2*bcp;
    var cores=num(h.cores)||Math.max(1,Math.ceil(gia2/40000));
    var liftCost=cores*storeys*18000;
    var sprCost=gia2*18;
    var ewsCost=storeys>=11?25000:0;
    var g2Cost=storeys>=18?45000:storeys>=11?28000:0;
    var structP=storeys>=20?gia2*15:storeys>=15?gia2*10:gia2*6;

        e("div",{style:{fontWeight:700,fontSize:13,color:bsa?"#B05A35":"#4A4BAE",marginBottom:12}},bsa?"🔴 Higher Risk Building — Building Safety Act 2022 applies":"🟡 Medium-rise — Fire Safety (England) Regulations apply"),

          return e("div",{key:fc.l,style:{display:"grid",gridTemplateColumns:"200px 1fr",gap:12,fontSize:11,padding:"4px 0",borderBottom:"1px solid rgba(0,0,0,0.05)"}},
            e("span",{style:{fontWeight:600,color:"#3A3D6A"}},fc.l),

          );
        })

    var totalBuild=rlvBc>0?rlvBc:tc4*0.65;
    // ── ASSET-TYPE AWARE GDV CALCULATION ──────────────────────────────────────
    // SFH: GDV = sum of house sales (not yield-based)
    // BTR/PBSA: GDV = NOI / exit yield
    var isSFH = at==="sfh";

    // Pull SFH figures from SFH appraisal if available

      var mix = (data.sfh&&data.sfh.mix)||[];

      var total = 0;
      for(var mi=0;mi<mix.length;mi++){
        var row=mix[mi]; var cnt=num(row.count);
        if(!cnt||!row.type)continue;
        var rowSqft=num(row.sqft)||900;
        var unitP=num(row.unitPrice||0);
        var sp=unitP&&rowSqft?unitP/rowSqft:(num(row.psf)||bPsf);

    })();

        (function(){
          // Filter stages by selected journey
          var activeStages=journey==="all"?ALL_STAGES:ALL_STAGES.filter(function(s){
            return s.journeys.indexOf(journey)>=0||s.journeys.indexOf("all")>=0;
          });

          var groups=[]; var seen={};
          activeStages.forEach(function(s){if(!seen[s.group]){groups.push(s.group);seen[s.group]=true;}});

          return [
            // Journey selector at top of sidebar
            e("div",{key:"journey-selector",style:{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.1)"}},
              e("div",{style:{fontSize:9,color:"rgba(255,255,255,0.4)",textTransform:"uppercase",letterSpacing:".12em",fontWeight:700,marginBottom:8}},"Workflow Type"),
              e("div",{style:{display:"flex",flexWrap:"wrap",gap:5}},
                [
                  {key:"land",label:"🔍 Land"},
                  {key:"property",label:"🏠 Property"},
                  {key:"sfh",label:"🏡 SFH"},
                  {key:"btr",label:"🏢 BTR"},
                  {key:"pbsa",label:"🎓 PBSA"},
                  {key:"recovery",label:"⚖ Recovery"},
                ].map(function(j){
                  var active=journey===j.key;
                  return e("div",{key:j.key,onClick:function(){setJourney(j.key);},
                    style:{padding:"4px 8px",background:active?"rgba(237,232,74,0.2)":"rgba(255,255,255,0.06)",border:"1px solid "+(active?"#EDE84A":"rgba(255,255,255,0.1)"),borderRadius:4,fontSize:9,fontWeight:active?700:400,color:active?"#EDE84A":"rgba(255,255,255,0.4)",cursor:"pointer",whiteSpace:"nowrap"}
                  },j.label);
                }).concat(
                  e("div",{key:"all",onClick:function(){setJourney("all");},
                    style:{padding:"4px 8px",background:journey==="all"?"rgba(237,232,74,0.2)":"rgba(255,255,255,0.06)",border:"1px solid "+(journey==="all"?"#EDE84A":"rgba(255,255,255,0.1)"),borderRadius:4,fontSize:9,fontWeight:journey==="all"?700:400,color:journey==="all"?"#EDE84A":"rgba(255,255,255,0.4)",cursor:"pointer"}
                  },"All Stages")
                )
              )
            )
          ].concat(
            groups.map(function(g){
              return e("div",{key:g},
                e("div",{style:{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:".15em",textTransform:"uppercase",padding:"10px 16px 3px",fontWeight:700}},g),
                activeStages.filter(function(s){return s.group===g;}).map(function(s){
                  var active=stage===s.id;
                  return e("div",{key:s.id,onClick:function(){navTo(s.id);},style:{display:"flex",alignItems:"center",gap:9,padding:"8px 16px",cursor:"pointer",background:active?"rgba(237,232,74,0.12)":"transparent",borderLeft:"3px solid "+(active?"#EDE84A":"transparent"),transition:"all .12s"}},
                    e("span",{style:{fontSize:10,color:active?"#EDE84A":"rgba(255,255,255,0.3)",width:14}},s.icon),
                    e("span",{style:{fontSize:12,color:active?"#fff":"rgba(255,255,255,0.5)"}},s.label)
                  );
                })
              );
            })
          );
        })()
      ),
      e("div",{style:{padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.08)",fontSize:11,color:"rgba(255,255,255,0.35)"}},
        (user&&user.name)||"User"," · ",(user&&user.company)||""
      )
    ),
    e("main",{style:{marginLeft:240,flex:1,display:"flex",flexDirection:"column",minHeight:"100vh"}},
      e("div",{style:{height:58,background:"#fff",borderBottom:"1px solid #DDE0ED",display:"flex",alignItems:"center",padding:"0 20px",gap:10,position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 3px rgba(46,47,138,0.08)"}},
        e("div",{style:{fontSize:15,fontWeight:700,color:"#2E2F8A",flex:1}},curStage.label),
        e("div",{style:{fontSize:11,color:"#7278A0",marginRight:8}},at.toUpperCase()+" · "+cityName(city)),
        e("button",{onClick:function(){navTo("summary");},style:{padding:"6px 12px",background:stage==="summary"?"#2E2F8A":"#F7F8FC",border:"1px solid "+(stage==="summary"?"#2E2F8A":"#DDE0ED"),color:stage==="summary"?"#fff":"#3A3D6A",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}},
          "📄 Summary"
        ),
        e("button",{
          onClick:doMasterAnalyse,
          disabled:data.masterLoading,
          style:{padding:"6px 14px",background:data.masterLoading?"#8889C8":"linear-gradient(135deg,#2D7A65,#4A4BAE)",border:"none",color:"#fff",borderRadius:5,fontSize:11,fontWeight:800,cursor:data.masterLoading?"not-allowed":"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap",boxShadow:"0 2px 8px rgba(74,75,174,0.3)"}},
          data.masterLoading?"⏳ Analysing...":"🧠 Analyse Deal"
        ),
        e("button",{onClick:function(){window.open("https://phildrumsdaniel.github.io/cassidy-landform/flowcharts.html","cassidy-flowcharts");},style:{padding:"6px 12px",background:"#4A4BAE",border:"1px solid #4A4BAE",color:"#fff",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}},
          "🗺 Flowcharts ↗"
        ),
        e("button",{onClick:function(){setShowHist(function(s){return !s;});},style:{padding:"6px 12px",background:showHist?"#4A4BAE":"#F7F8FC",border:"1px solid "+(showHist?"#4A4BAE":"#DDE0ED"),color:showHist?"#fff":"#3A3D6A",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}},
          "📋 History"+(history.length>0?" ("+history.length+")":"")
        ),
        e("button",{onClick:saveDeal,style:{padding:"6px 12px",background:"#F7F8FC",border:"1px solid #DDE0ED",color:"#3A3D6A",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}},
          "💾 Save Deal"
        ),
        e("button",{onClick:clearDeal,style:{padding:"6px 12px",background:"#FFF5F0",border:"1px solid #E8C4B0",color:"#B05A35",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif",whiteSpace:"nowrap"}},
          "✕ New Deal"
        )
      ),
      e("div",{style:{height:3,background:"#DDE0ED"}},
        e("div",{style:{height:"100%",width:((idx+1)/STAGES.length*100)+"%",background:"linear-gradient(90deg,#4A4BAE,#EDE84A)",transition:"width .4s"}})
      ),
      showHist&&e("div",{style:{position:"fixed",top:58,right:0,width:380,bottom:0,background:"#fff",borderLeft:"1px solid #DDE0ED",boxShadow:"-4px 0 16px rgba(0,0,0,0.08)",zIndex:200,display:"flex",flexDirection:"column",overflowY:"auto"}},
        e("div",{style:{padding:"16px 20px",borderBottom:"1px solid #DDE0ED",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          e("div",{style:{fontSize:13,fontWeight:700,color:"#2E2F8A"}},"Deal History"),
          e("button",{onClick:function(){setShowHist(false);},style:{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"#7278A0"}}, "×")
        ),
        history.length===0?e("div",{style:{padding:"32px 20px",textAlign:"center",color:"#7278A0",fontSize:13}},
          e("div",{style:{fontSize:24,marginBottom:8}},"📋"),
          "No saved deals yet.",
          e("br"),
          "Click 💾 Save Deal to save your current work."
        ):e("div",{style:{padding:"12px"}},
          history.map(function(snap){
            return e("div",{key:snap.id,style:{background:"#F7F8FC",border:"1px solid #DDE0ED",borderRadius:8,padding:"14px 16px",marginBottom:8}},
              e("div",{style:{fontSize:13,fontWeight:700,color:"#2E2F8A",marginBottom:4}},snap.name),
              e("div",{style:{display:"flex",gap:10,fontSize:10,color:"#7278A0",marginBottom:10,flexWrap:"wrap"}},
                e("span",null,snap.assetType.toUpperCase()),
                snap.city&&snap.city!=="—"&&e("span",null,"· "+cityName(snap.city)),
                snap.acres&&e("span",null,"· "+snap.acres+" acres"),
                snap.price&&e("span",null,"· £"+Number(snap.price).toLocaleString()),
                e("span",null,"· "+snap.savedAt)
              ),
              e("div",{style:{display:"flex",gap:8}},
                e("button",{onClick:function(){loadDeal(snap);},style:{flex:1,padding:"7px",background:"#4A4BAE",border:"none",color:"#fff",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"DM Sans,sans-serif"}},
                  "Load →"
                ),
                e("button",{onClick:function(){setHistory(function(h){return h.filter(function(d){return d.id!==snap.id;});});},style:{padding:"7px 10px",background:"transparent",border:"1px solid #DDE0ED",color:"#B05A35",borderRadius:5,fontSize:11,cursor:"pointer"}},
                  "✕"
                )
              )
            );
          })
        )
      ),
      e("div",{style:{flex:1,padding:"28px 32px",maxWidth:1000,width:"100%"}},renderStage()),
      e("div",{style:{padding:"16px 32px",borderTop:"1px solid #DDE0ED",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff"}},
        e("button",{disabled:idx===0,onClick:function(){navTo(STAGES[idx-1].id);},style:{padding:"8px 18px",border:"1px solid #DDE0ED",background:"transparent",color:"#7278A0",borderRadius:6,fontSize:12,fontWeight:700,cursor:idx===0?"not-allowed":"pointer",fontFamily:"DM Sans,sans-serif",opacity:idx===0?0.3:1}},"← Previous"),
        e("span",{style:{fontSize:11,color:"#7278A0"}},(idx+1)+" of "+STAGES.length),
        e("button",{disabled:idx===STAGES.length-1,onClick:function(){navTo(STAGES[idx+1].id);},style:{padding:"8px 18px",background:"#4A4BAE",border:"none",color:"#fff",borderRadius:6,fontSize:12,fontWeight:700,cursor:idx===STAGES.length-1?"not-allowed":"pointer",fontFamily:"DM Sans,sans-serif",opacity:idx===STAGES.length-1?0.3:1}},"Next →")
      )
    )
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function Root(){
  var s=useState(null); var user=s[0]; var setUser=s[1];
  if(!user)return e(AccessGate,{onLogin:function(u){logEvent(u,"LOGIN","Access granted");setUser(u);}});
  return e(Tool,{user:user});
}

ReactDOM.render(e(Root,null),document.getElementById("root"));

</script>
</body>
